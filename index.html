<title>출석관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f13;--card:#1e1e28;--surf:#252530;--brd:#2e2e3e;--txt:#f0f0f5;--mu:#7878a0;--acc:#6c6cff;--green:#26de81;--red:#ff5c5c;--t1:#ff9f43;--t2:#5cc8ff;--t3:#a29bfe}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh}

/* ── 공통 ── */
#toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));left:50%;transform:translateX(-50%);background:var(--green);color:#0f0f13;font-weight:700;font-size:13px;padding:8px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-sm{font-size:12px;padding:0 12px;height:36px;border-radius:9px;border:1px solid var(--brd);background:transparent;color:var(--mu);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;transition:all .15s}
.closed-box{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:32px 20px;text-align:center;color:var(--mu);font-size:14px}

/* ── 설정 ── */
#setup{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px}
.setup-box{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:36px 28px;width:100%;max-width:460px;text-align:center}
.setup-box h1{font-size:24px;font-weight:700;margin-bottom:8px}
.setup-box p{color:var(--mu);margin-bottom:20px;font-size:13px;line-height:1.7}
.guide-box{background:var(--surf);border-radius:12px;padding:14px 18px;text-align:left;margin-bottom:16px;font-size:12px;color:var(--mu);line-height:2.2}
.guide-box b{color:var(--txt)}
.db-input{width:100%;background:var(--surf);border:1.5px solid var(--brd);border-radius:12px;color:var(--txt);font-size:14px;padding:12px 14px;outline:none;font-family:inherit;margin-bottom:12px}
.db-input:focus{border-color:var(--acc)}
.btn-connect{width:100%;padding:14px;border-radius:12px;border:none;background:var(--acc);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── 모바일 ── */
#main-mob{display:none}
.mob-sticky{position:sticky;top:0;background:var(--bg);z-index:20}
.mob-header{padding:max(20px,env(safe-area-inset-top,20px)) 14px 0}
.mob-drow{display:flex;align-items:center;margin-bottom:5px}
.mob-date{display:flex;align-items:baseline;gap:8px;flex:1}
.mob-dmain{font-size:32px;font-weight:700;letter-spacing:-.8px;line-height:1}
.mob-dsub{font-size:17px;color:var(--mu)}
.mob-right{display:flex;align-items:center;gap:7px}
.mob-statbar{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mu);padding-bottom:12px;border-bottom:1px solid var(--brd);margin-bottom:10px}
/* 날짜 네비 */
.mob-nav{display:flex;gap:4px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none}
.mob-nav::-webkit-scrollbar{display:none}
.nb{flex-shrink:0;width:36px;height:48px;border-radius:10px;border:1px solid var(--brd);background:var(--surf);color:var(--mu);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:inherit;gap:1px}
.nb.act{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700}
.nb.off{color:#2a2a40;border-color:#1e1e2e}
.nb .nn{font-size:13px;font-weight:600}
.nb .nw{font-size:9px}
/* 반 바로가기 */
.cls-tabs{display:flex;gap:5px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none}
.cls-tabs::-webkit-scrollbar{display:none}
.cls-tab{flex-shrink:0;padding:0 10px;height:34px;border-radius:9px;border:1px solid;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
/* 타임 탭 */
.time-tabs{display:none;gap:6px;padding:0 10px 10px}
.time-tab{flex:1;height:38px;border-radius:10px;border:1.5px solid var(--brd);background:var(--surf);color:var(--mu);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .2s}
.time-tab.on{border-color:transparent;color:#fff}
/* 컨텐츠 */
.mob-content{padding:0 10px 40px;display:flex;flex-direction:column;gap:8px}

/* ── PC ── */
#main-pc{display:none;height:100vh;grid-template-columns:380px 1fr;grid-template-rows:auto 1fr}
.pc-topbar{grid-column:1/-1;background:var(--card);border-bottom:1px solid var(--brd);padding-top:env(safe-area-inset-top);padding-left:env(safe-area-inset-left)}
.pc-topbar-inner{display:flex;align-items:center;height:56px;padding:0 20px;gap:14px;width:100%}
.pc-logo{font-size:14px;font-weight:700}
.pc-date{font-size:20px;font-weight:700;letter-spacing:-.5px}
.pc-right{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--mu)}
.pc-sidebar{background:var(--card);border-right:1px solid var(--brd);overflow-y:auto;padding:20px 16px;padding-left:max(16px,env(safe-area-inset-left))}
.pc-sidebar h3{font-size:12px;font-weight:600;color:var(--mu);margin-bottom:10px;letter-spacing:.5px}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal-hd{font-size:12px;color:var(--mu);text-align:center;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.cal-day{width:100%;aspect-ratio:1;border-radius:9px;border:1px solid var(--brd);background:var(--surf);color:var(--mu);cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;transition:all .15s}
.cal-day.act{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700}
.cal-day.off{opacity:.2;cursor:default;pointer-events:none}
.cal-day.today-ring{border-color:var(--acc);color:var(--acc)}
.cal-day.act.today-ring{color:#fff}
.pc-sidebar .cls-tabs{padding:0;flex-direction:row;flex-wrap:wrap;gap:6px}
.pc-sidebar .cls-tab{border-radius:9px;font-size:13px;height:36px}
.pc-content{overflow-y:auto;padding:16px}
.pc-time-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

/* ── 공통 타임블록 ── */
.tblock{border-radius:14px;overflow:hidden;border:1px solid var(--brd);background:var(--card)}
.thd{display:flex;align-items:center;gap:7px;padding:11px 14px;background:var(--surf);border-bottom:1px solid var(--brd)}
.tbadge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.trange{font-size:11px;color:var(--mu)}
.tcnt{margin-left:auto;font-size:11px;color:var(--mu)}
.tblock-body{display:block}
.cls-hd{padding:5px 14px 2px;display:flex;align-items:center;gap:5px}
.cls-dot{width:5px;height:5px;border-radius:50%}
.cls-nm{font-size:10px;font-weight:700}
/* 학생 행 */
.srow{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--brd);transition:background .15s}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid #404060;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;user-select:none}
.chk.on{border-color:var(--green);background:var(--green)}
.chk.red{border-color:var(--red);background:var(--red)}
.chk.early{border-color:#ff9f43;background:#ff9f43}
.sinfo{flex:1;min-width:0}
.snm{font-size:14px;font-weight:500}
.snm.x{color:#444;text-decoration:line-through}
.ssc{font-size:11px;color:var(--mu)}
.abtn{font-size:11px;font-weight:700;padding:0 8px;height:22px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;white-space:nowrap}
/* 결석 편집 */
.rrow{padding:8px 14px 8px 50px;border-bottom:1px solid var(--brd)}
.rtags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.rtag{font-size:12px;padding:0 11px;height:32px;border-radius:9px;border:1px solid var(--brd);background:var(--surf);color:var(--mu);cursor:pointer;display:inline-flex;align-items:center;transition:all .15s}
.rtag:active{border-color:var(--acc);color:var(--txt)}
.rinput-row{display:flex;gap:6px;align-items:center}
.ri{flex:1;background:var(--surf);border:1px solid #3a3a5a;border-radius:9px;color:var(--txt);font-size:13px;padding:8px 11px;font-family:inherit;outline:none}
.ri:focus{border-color:var(--acc)}
.rbtn{font-size:13px;font-weight:700;padding:0 16px;height:38px;border-radius:9px;background:var(--acc);color:#fff;border:none;cursor:pointer;font-family:inherit;flex-shrink:0;display:inline-flex;align-items:center}
/* 결석 compact 정보 */
.absent-info{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 50px;border-bottom:1px solid var(--brd)}
.absent-reason{font-size:12px;color:#ff5c5c99;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:underline dotted #ff5c5c44}

.contact-mini{display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0}
.chk-mini{width:16px;height:16px;border-radius:5px;border:1.5px solid #404060;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chk-mini.on{border-color:var(--t1);background:var(--t1)}
.contact-label{font-size:11px}

/* ── 관리자 ── */
#admin{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;flex-direction:column;overflow:hidden;background:var(--bg)}
.admin-hd{background:var(--bg);border-bottom:1px solid var(--brd);padding:max(20px,env(safe-area-inset-top,20px)) 16px 0;flex-shrink:0}
.admin-row1{display:flex;align-items:center;margin-bottom:5px}
.admin-title{font-size:32px;font-weight:700;letter-spacing:-.8px;flex:1}
.admin-sub{font-size:17px;color:var(--mu)}
.admin-right{display:flex;align-items:center;gap:7px}
.admin-row2{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mu);padding-bottom:12px;border-bottom:1px solid var(--brd)}
.mnbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.admin-tabs{display:flex;border-bottom:1px solid var(--brd);padding:0 14px;background:var(--card);flex-shrink:0}
.tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent}
.tab.act{color:var(--acc);border-bottom-color:var(--acc)}
.admin-body{overflow-y:auto;padding:14px;flex:1;background:var(--bg)}
.acard{background:var(--card);border:1px solid var(--brd);border-radius:14px;overflow:hidden;margin-bottom:10px}
.acard-hd{padding:10px 14px;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.abs-row{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--brd)}
.abs-row:last-child{border-bottom:none}
.abs-date{font-size:11px;color:var(--mu);min-width:72px;flex-shrink:0;line-height:1.9}
.abs-name{font-size:13px;font-weight:600}
.abs-reason{font-size:11px;color:var(--red)}
.stat-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--brd)}
.stat-row:last-child{border-bottom:none}
.stat-name{font-size:13px;font-weight:500;min-width:60px}
.stat-bars{flex:1}
.sbar-bg{height:6px;border-radius:3px;background:var(--brd);overflow:hidden;margin-bottom:3px}
.sbar-fill{height:100%;border-radius:3px;transition:width .4s}
.sbar-nums{font-size:11px;color:var(--mu);display:flex;gap:8px}
.day-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--brd)}
.day-row:last-child{border-bottom:none}
.day-label{font-size:12px;font-weight:600;min-width:72px;flex-shrink:0}
.empty{text-align:center;padding:40px 20px;color:var(--mu);font-size:14px}
.csv-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:10px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px}
@media(min-width:1100px){
  body{overflow:hidden;height:100vh}
  #main-pc{display:grid!important}
}

/* ── 태블릿 (600px ~ 1100px) ── */
@media(min-width:600px) and (max-width:1099px){
  .mob-dmain{font-size:38px}
  .mob-dsub{font-size:20px}

  /* 태블릿: 멀티타임 나란히 표시 */
  .tab-time-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
  .tblock{border-radius:16px}

  .cls-hd{padding:8px 18px 3px}
  .mob-statbar{font-size:14px}
  .btn-sm{font-size:13px;height:38px;padding:0 14px}
}

<script>
const SCHOOL={"박민지":"중앙여고졸","김나연":"계성여고3","박선영":"검정고시","김나현":"사대부고졸","김도훈":"내성고1","박하영":"사직고1","안시연":"해화여중3","한지유":"초연중3","조제우":"초읍중3","전서빈":"연일중3","권해원":"부산여중3","김현준":"부곡중3","최주연":"온천중3","나은솔":"사직여중2","김건휘":"여명중2","김예진":"사직여중1","최다윤":"만덕중2","신유나":"사직중2","최현우":"동인고1","감윤재":"여명중1","김가람":"사직여중1","이지아":"거제여중1","명지민":"사직여중1"};
const TIMES=["1타임","2타임","3타임"],TR={"1타임":"10:00~13:30","2타임":"14:00~17:30","3타임":"18:30~22:00"};
const CLS=["입시반","예비반","중등반","취미반"],CC={"입시반":"#ff7c5c","예비반":"#26de81","중등반":"#45aaf2","취미반":"#ffd32a"};
const TC={"1타임":"#ff9f43","2타임":"#5cc8ff","3타임":"#a29bfe"},DW=["일","월","화","수","목","금","토"];
const SCHEDULE_UPDATED='2026-07-02'; // 시간표 최종 업데이트
const PHONE={
  "김도훈":"010-7353-0136","박하영":"010-2898-8344","안시연":"010-8216-8117",
  "한지유":"010-9578-0308","조제우":"010-6626-8931","전서빈":"010-4517-8515",
  "권해원":"010-7887-7547","김현준":"010-6238-6980","최주연":"010-4519-2704",
  "나은솔":"010-7644-2874","김건휘":"010-4241-6027","김예진":"010-3214-6306",
  "최다윤":"010-3469-1228","신유나":"010-4588-9122","최현우":"010-8295-7408",
  "감윤재":"010-3201-3014","김가람":"010-5604-6864","이지아":"010-8753-1302",

};

let S = {}; // Firebase에서 로드

async function loadTimetable() {
  try {
    const data = await fbGet('timetable');
    if(data && typeof data === 'object') {
      // 각 날짜의 타임 구조 검증 및 보정
      const fixed = {};
      Object.entries(data).forEach(([date, dayData]) => {
        fixed[date] = {};
        ['1타임','2타임','3타임'].forEach(tim => {
          fixed[date][tim] = {};
          ['입시반','예비반','중등반','취미반'].forEach(cls => {
            fixed[date][tim][cls] = (dayData[tim] && dayData[tim][cls]) ? dayData[tim][cls] : [];
          });
        });
      });
      S = fixed;
      console.log('시간표 Firebase 로드 완료');
    }
  } catch(e) {
    console.warn('Firebase 시간표 로드 실패:', e);
  }
}

// ── 상태 ─────────────────────────────────────────────
let DB='https://hwa1-c1ad9-default-rtdb.firebaseio.com';
let cur='',att={},drafts={},curTime=null,saveTimer=null,toastTimer=null,pollTimer=null;
let adminY=2026,adminM=7,adminTab=0,adminData={};

function toKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
const isMob=()=>window.innerWidth<1100;
const isTab=()=>window.innerWidth>=600&&window.innerWidth<1100;
async function fbGet(p){const r=await fetch(`${DB}/${p}.json`);if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}
async function fbSet(p,d){await fetch(`${DB}/${p}.json`,{method:'PATCH',body:JSON.stringify(d),headers:{'Content-Type':'application/json'}})}

function toast(m,c='var(--green)'){
  const el=document.getElementById('toast');el.textContent=m;el.style.background=c;el.style.opacity='1';
  if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.opacity='0',2200);
}
function retrySync(){load(cur)}

// ── 앱 시작 ──────────────────────────────────────────
function launch(){
  const su=document.getElementById('setup');if(su)su.style.display='none';
  // 로컬파일로 열면 안내
  if(location.protocol==='file:'){
    setTimeout(()=>toast('GitHub Pages URL로 열어주세요: zzone67-eng.github.io/chulseok','var(--red)'),1000);
  }
  if(isMob()||isTab()) document.getElementById('main-mob').style.display='block';
  else                   document.getElementById('main-pc').style.display='grid';
  cur=toKey(new Date());loadTimetable().then(()=>{buildNav();load(cur);});
  const sd=document.getElementById('sch-date');if(sd)sd.textContent=SCHEDULE_UPDATED;
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(()=>load(cur,false),30000);
}
async function load(dk,show=true){
  if(show){const ct=isMob()?'mob-ct':'pc-ct';const el=document.getElementById(ct);if(el)el.innerHTML='<div class="closed-box">불러오는 중…</div>';}
  try{const d=await fbGet(`att/${dk}`);att[dk]=d||{};}
  catch(err){if(!att[dk])att[dk]={};console.error('load err:',err);}
  if(dk===cur)render();
}
function go(dk){
  cur=dk;curTime=null;buildNav();
  // PC content 스크롤 초기화
  const pc=document.querySelector('.pc-content');if(pc)pc.scrollTop=0;
  const mob=document.getElementById('mob-ct');if(mob)mob.scrollTop=0;
  if(!att[dk]){const ct=isMob()?'mob-ct':'pc-ct';document.getElementById(ct).innerHTML='<div class="closed-box">불러오는 중…</div>';load(dk);}
  else render();
}
function ent(ti,n){return att[cur]?.[ti]?.[n]||{present:false,absent:false,earlyLeave:false,reason:'',contact:false,contact2:false}}
function upd(ti,n,p){
  const e=ent(ti,n),nx={...e,...p};
  if(!att[cur])att[cur]={};if(!att[cur][ti])att[cur][ti]={};
  att[cur][ti][n]=nx;render();
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>fbSet(`att/${cur}/${ti}`,{[n]:nx}).then(()=>toast('저장됨 ✓')).catch(()=>toast('저장 실패','var(--red)')),500);
}
function tgP(ti,n){const e=ent(ti,n);if(!e.absent)upd(ti,n,{present:!e.present})}
function tgE(ti,n){
  const e=ent(ti,n);
  if(e.earlyLeave){upd(ti,n,{earlyLeave:false});}
  else{upd(ti,n,{earlyLeave:true,absent:false,present:false});}
}
function tgA(ti,n){
  const e=ent(ti,n);
  if(e.absent){upd(ti,n,{absent:false,reason:'',contact:false,contact2:false});delete drafts[ti+':'+n];}
  else{upd(ti,n,{absent:true,present:false});drafts[ti+':'+n]=e.reason||'';}
}
function setTag(ti,n,t){
  drafts[ti+':'+n]=t;
  const el=document.getElementById('ri_'+ti+'_'+n.replace(/[^가-힣a-z0-9]/gi,''));
  if(el){el.value=t;el.focus();}
}
function saveR(ti,n){
  const el=document.getElementById('ri_'+ti+'_'+n.replace(/[^가-힣a-z0-9]/gi,''));
  const v=el?el.value:'';delete drafts[ti+':'+n];
  upd(ti,n,{reason:v});toast('사유 저장됨 ✓');
}
function editR(ti,n){drafts[ti+':'+n]=ent(ti,n).reason||'';render()}
function tgC(ti,n){const e=ent(ti,n);upd(ti,n,{contact:!e.contact})}
function tgC2(ti,n){const e=ent(ti,n);upd(ti,n,{contact2:!e.contact2})}

// ── 네비게이션 ────────────────────────────────────────
function buildNav(){
  const tk=toKey(new Date());
  const d=new Date(cur+'T12:00:00');
  const dm=`${d.getMonth()+1}월 ${d.getDate()}일`,ds=`(${DW[d.getDay()]})`;
  // 날짜 표시
  ['mob-dm','pc-dm'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=dm;});
  ['mob-ds','pc-ds'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=ds;});
  const btnT=document.getElementById('btn-today');
  if(btnT)btnT.style.display=cur!==tk?'inline-flex':'none';

  if(isMob()) buildMobNav(tk);
  else buildPcCal(tk);
  buildClsTabs();
}
function buildMobNav(tk){
  let h='';
  for(let i=1;i<=31;i++){
    const dk=`2026-07-${String(i).padStart(2,'0')}`;
    const off=S[dk]===null||S[dk]===undefined;
    h+=`<button class="nb${dk===cur?' act':''}${off?' off':''}" onclick="go('${dk}')"><span class="nn">${i}</span><span class="nw">${DW[new Date(dk+'T12:00:00').getDay()]}</span></button>`;
  }
  const nav=document.getElementById('mob-nav');
  if(nav){nav.innerHTML=h;setTimeout(()=>{const b=nav.querySelector('.act');if(b)b.scrollIntoView({block:'nearest',inline:'center'});},50);}
}
function buildPcCal(tk){
  const fd=new Date('2026-07-01T12:00:00').getDay();
  let h='';for(let i=0;i<fd;i++)h+='<div></div>';
  for(let i=1;i<=31;i++){
    const dk=`2026-07-${String(i).padStart(2,'0')}`;
    const off=S[dk]===null||S[dk]===undefined,act=dk===cur,isT=dk===tk;
    h+=`<button class="cal-day${act?' act':''}${off?' off':''}${isT&&!act?' today-ring':''}" ${off?'disabled':''} onclick="go('${dk}')">${i}</button>`;
  }
  const el=document.getElementById('pc-cal');if(el)el.innerHTML=h;
}
function buildClsTabs(){
  const sc=S[cur];if(!sc){
    const ct=document.getElementById('cls-tabs');if(ct)ct.innerHTML='';
    const pt=document.getElementById('pc-cls-tabs');if(pt)pt.innerHTML='';
    buildTimeTabs();return;
  }
  // 현재 보여주는 타임
  const activeTimes=TIMES.filter(t=>CLS.some(c=>(sc[t][c]||[]).length>0));
  const viewTime=isMob()&&activeTimes.length>1?curTime:null;

  function tab(c,extra=''){
    // 현재 타임에 해당 반 있는지 확인
    const hasInView=viewTime?(sc[viewTime][c]||[]).length>0:TIMES.some(t=>(sc[t][c]||[]).length>0);
    const dim=!hasInView;
    return `<button class="cls-tab" onclick="${dim?'':("jumpToCls('"+c+"')")}"
      style="background:${CC[c]}${dim?'0a':'18'};color:${CC[c]};border-color:${CC[c]}${dim?'22':'44'};opacity:${dim?'0.35':'1'};cursor:${dim?'default':'pointer'};${extra}">${c}</button>`;
  }
  // 전체 반 목록 표시 (있는 반만)
  const allCls=CLS.filter(c=>TIMES.some(t=>(sc[t][c]||[]).length>0));
  const ct=document.getElementById('cls-tabs');if(ct)ct.innerHTML=allCls.map(c=>tab(c)).join('');
  const pt=document.getElementById('pc-cls-tabs');if(pt)pt.innerHTML=allCls.map(c=>tab(c,'width:100%;')).join('');
  buildTimeTabs();
}
function buildTimeTabs(){
  const sc=S[cur];
  const activeTimes=sc?TIMES.filter(ti=>CLS.some(c=>(sc[ti][c]||[]).length>0)):[];
  const tb=document.getElementById('time-tabs');if(!tb)return;
  if(!isMob()||isTab()||activeTimes.length<=1){tb.style.display='none';return;}
  if(!curTime||!activeTimes.includes(curTime))curTime=activeTimes[0];
  tb.style.display='flex';
  tb.innerHTML=activeTimes.map(ti=>`
    <button class="time-tab${ti===curTime?' on':''}" onclick="selectTime('${ti}')"
      style="${ti===curTime?`background:${TC[ti]};border-color:${TC[ti]};`:''}">${ti}</button>`).join('');
}
function selectTime(ti){curTime=ti;render()}
function jumpTo(ti,cls){
  const sc=S[cur];const activeTimes=sc?TIMES.filter(t=>CLS.some(c=>(sc[t][c]||[]).length>0)):[];
  if(isMob()&&activeTimes.length>1){curTime=ti;render();setTimeout(()=>scrollToCls(ti,cls),130);}
  else{setTimeout(()=>scrollToCls(ti,cls),130);}
}
function jumpToCls(cls){
  const sc=S[cur];if(!sc)return;
  const activeTimes=TIMES.filter(t=>CLS.some(c=>(sc[t][c]||[]).length>0));
  // 현재 보여주는 타임에서 해당 반 위치로 스크롤
  const ti=isMob()&&activeTimes.length>1?curTime:TIMES.find(t=>(sc[t][cls]||[]).length>0);
  if(!ti)return;
  scrollToCls(ti,cls);
}
function scrollToCls(ti,cls){
  const el=document.getElementById('cls_'+ti+'_'+cls);if(!el)return;
  const pc=document.querySelector('.pc-content');
  // isMob()=false(PC/태블릿PC)일 때만 pc-content 스크롤
  if(!isMob()&&pc){
    const top=pc.scrollTop+(el.getBoundingClientRect().top-pc.getBoundingClientRect().top)-10;
    pc.scrollTo({top,behavior:'smooth'});
  } else {
    // 모바일/태블릿모바일: window 스크롤
    const sticky=document.querySelector('.mob-sticky');
    const off=sticky?sticky.offsetHeight+6:0;
    const top=el.getBoundingClientRect().top+window.scrollY-off;
    window.scrollTo({top,behavior:'smooth'});
  }
}

// ── 렌더 ─────────────────────────────────────────────
function render(){
  const sc=S[cur];let tot=0,pres=0,ab=0;
  if(sc)TIMES.forEach(ti=>CLS.forEach(c=>(sc[ti][c]||[]).forEach(n=>{tot++;const e=ent(ti,n);if(e.present)pres++;if(e.absent)ab++;if(e.earlyLeave)ab++;})));
  const early=sc?TIMES.reduce((s,ti)=>s+CLS.reduce((s2,c)=>s2+(sc[ti][c]||[]).filter(n=>ent(ti,n).earlyLeave).length,0),0):0;
  const stat=sc?`출석 <b style="color:var(--green)">${pres}</b> · 조퇴 <b style="color:#ff9f43">${early}</b> · 결석 <b style="color:var(--red)">${ab}</b> · 미확인 <b>${tot-pres-ab-early}</b> / ${tot}명`:'휴강';
  ['mob-stats','pc-stats'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=stat;});

  buildTimeTabs();

  if(!sc){setContent('<div class="closed-box">휴강입니다</div>');return;}
  const isPC=!isMob();
  const activeTimes=TIMES.filter(ti=>CLS.some(c=>(sc[ti][c]||[]).length>0));
  const useGrid=isPC||(isTab()&&activeTimes.length>1);
  const showTimes=useGrid?activeTimes:(activeTimes.length>1&&curTime)?[curTime]:activeTimes;
  let h=isPC?'<div class="pc-time-grid">':useGrid?'<div class="tab-time-grid">':''

  showTimes.forEach(ti=>{
    const all=CLS.flatMap(c=>(sc[ti][c]||[]).map(n=>({n,c})));
    if(!all.length)return;
    const pc2=all.filter(({n})=>ent(ti,n).present).length;
    const ac=all.filter(({n})=>ent(ti,n).absent).length;
    const tc=TC[ti];
    h+=`<div class="tblock" id="tblock_${ti}">
      <div class="thd">
        <span class="tbadge" style="background:${tc}22;color:${tc}">${ti}</span>
        <span class="trange">${TR[ti]}</span>
        <span class="tcnt">출<b style="color:var(--green);margin:0 2px">${pc2}</b>결<b style="color:var(--red);margin:0 2px">${ac}</b>/${all.length}명</span>
      </div>
      <div class="tblock-body" id="tbody_${ti}">`;

    CLS.forEach(c=>{
      const ns=sc[ti][c]||[];if(!ns.length)return;
      h+=`<div id="cls_${ti}_${c}"><div class="cls-hd"><div class="cls-dot" style="background:${CC[c]}"></div><span class="cls-nm" style="color:${CC[c]}">${c}</span></div>`;
      ns.forEach(name=>{
        const e=ent(ti,name),rk=ti+':'+name,hd=drafts[rk]!==undefined;
        const chk=e.present&&!e.absent;
        const rid='ri_'+ti+'_'+name.replace(/[^가-힣a-z0-9]/gi,'');
        h+=`<div>
          <div class="srow" style="${e.absent?'background:#ff5c5c08':e.earlyLeave?'background:#ff9f4308':e.present?'background:#26de8108':''}">
            <div class="chk${e.absent?' red':e.earlyLeave?' early':chk?' on':''}" onclick="tgP('${ti}','${name}')">${chk?'<span style="font-size:12px;color:#0f0f13;font-weight:800">✓</span>':e.absent?'<span style="font-size:12px;color:#fff;font-weight:800">✕</span>':e.earlyLeave?'<span style="font-size:12px;color:#fff;font-weight:800">↙</span>':''}</div>
            <div class="sinfo"><div class="snm${e.absent?' x':''}">${name}</div><div class="ssc">${SCHOOL[name]||''}</div></div>
            ${PHONE[name]?`<a href="tel:${PHONE[name].replace(/-/g,'')}" style="text-decoration:none;padding:0 4px;flex-shrink:0;display:inline-flex;align-items:center" onclick="event.stopPropagation()">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C10.01 21 3 13.99 3 5a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.46.57 3.58a1 1 0 01-.24 1.01l-2.21 2.2z" fill="#26de81"/>
</svg></a>`:''}
            <button class="abtn" onclick="tgE('${ti}','${name}')" style="background:${e.earlyLeave?'#ff9f43':'#2a2a3a'};color:${e.earlyLeave?'#fff':'var(--mu)'}">조퇴</button>
            <button class="abtn" onclick="tgA('${ti}','${name}')" style="background:${e.absent?'var(--red)':'#2a2a3a'};color:${e.absent?'#fff':'var(--mu)'}">${e.absent?'출석':'결석'}</button>
          </div>`;
        if(e.absent){
          if(hd){
            h+=`<div class="rrow">
              <div class="rtags">${TAGS.map(t=>`<span class="rtag" onclick="setTag('${ti}','${name}','${t}')">${t}</span>`).join('')}</div>
              <div class="rinput-row">
                <input id="${rid}" class="ri" placeholder="결석 사유..." value="${(drafts[rk]||'').replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')saveR('${ti}','${name}')">
                <button class="rbtn" onclick="saveR('${ti}','${name}')">저장</button>
              </div>
            </div>`;
          } else {
            h+=`<div class="absent-info">
              <span class="absent-reason" onclick="editR('${ti}','${name}')" style="cursor:pointer">결석사유: ${e.reason||'(탭해서 입력)'}</span>
              <div class="contact-mini" onclick="tgC('${ti}','${name}')">
                <div class="chk-mini${e.contact?' on':''}">${e.contact?'<span style="font-size:9px;color:#0f0f13;font-weight:900">✓</span>':''}</div>
                <span class="contact-label" style="color:${e.contact?'var(--t1)':'var(--mu)'}">학부모</span>
              </div>
              <div class="contact-mini" onclick="tgC2('${ti}','${name}')">
                <div class="chk-mini${e.contact2?' on':''}">${e.contact2?'<span style="font-size:9px;color:#0f0f13;font-weight:900">✓</span>':''}</div>
                <span class="contact-label" style="color:${e.contact2?'var(--t1)':'var(--mu)'}">학생</span>
              </div>
            </div>`;
          }
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  if(useGrid)h+=`</div>`;
  setContent(h);
  buildClsTabs();
}
function setContent(h){
  const ct=isMob()?'mob-ct':'pc-ct';
  document.getElementById(ct).innerHTML=h;
}
window.addEventListener('resize',()=>{
  if(document.getElementById('admin').style.display==='flex')return;
  const mob=document.getElementById('main-mob'),pc=document.getElementById('main-pc');
  if(isMob()||isTab()){mob.style.display='block';pc.style.display='none';}
  else{mob.style.display='none';pc.style.display='grid';}
  buildNav();render();
});

// ── 관리자 ──────────────────────────────────────────
function openAdmin(){
  ['main-mob','main-pc'].forEach(id=>document.getElementById(id).style.display='none');
  const adm=document.getElementById('admin');adm.style.display='flex';
  adminY=parseInt(cur.slice(0,4));adminM=parseInt(cur.slice(5,7));
  document.getElementById('admin-month-label').textContent=`${adminY}년 ${adminM}월`;
  loadAdminData();
}
function closeAdmin(){
  document.getElementById('admin').style.display='none';
  if(isMob())document.getElementById('main-mob').style.display='block';
  else document.getElementById('main-pc').style.display='grid';
}
function changeMonth(d){
  adminM+=d;if(adminM>12){adminM=1;adminY++;}if(adminM<1){adminM=12;adminY--;}
  document.getElementById('admin-month-label').textContent=`${adminY}년 ${adminM}월`;
  adminData={};loadAdminData();
}
function switchTab(i){
  adminTab=i;['tab0','tab1','tab2','tab3'].forEach((id,j)=>document.getElementById(id).className='tab'+(j===i?' act':''));
  renderAdmin();
}
async function loadAdminData(){
  document.getElementById('admin-ct').innerHTML='<div class="empty">불러오는 중…</div>';
  const ym=`${adminY}-${String(adminM).padStart(2,'0')}`,days=new Date(adminY,adminM,0).getDate();
  await Promise.all(Array.from({length:days},(_,i)=>{
    const dk=`${ym}-${String(i+1).padStart(2,'0')}`;
    return fbGet(`att/${dk}`).then(d=>adminData[dk]=d||{}).catch(()=>adminData[dk]={});
  }));
  renderAdmin();
}
function renderAdmin(){
  const ym=`${adminY}-${String(adminM).padStart(2,'0')}`,days=new Date(adminY,adminM,0).getDate();
  if(adminTab===0)rAbsences(ym,days);
  else if(adminTab===1)rStats(ym,days);
  else if(adminTab===2)rDays(ym,days);
  else rAbsCount();
}
function rAbsCount(){
  // 날짜 범위 입력 UI + 집계 결과
  const today=toKey(new Date());
  const defStart=`${adminY}-${String(adminM).padStart(2,'0')}-01`;
  const defEnd=`${adminY}-${String(adminM).padStart(2,'0')}-${String(new Date(adminY,adminM,0).getDate()).padStart(2,'0')}`;
  if(!window._absFrom)window._absFrom=defStart;
  if(!window._absTo)window._absTo=defEnd;

  let h=`<div style="background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:14px;margin-bottom:12px">
    <div style="font-size:13px;color:var(--mu);margin-bottom:10px">조회 기간 설정</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <input type="date" id="abs-from" value="${window._absFrom}"
        style="flex:1;min-width:130px;background:var(--surf);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-size:13px;padding:7px 10px;font-family:inherit;outline:none">
      <span style="color:var(--mu);font-size:13px">~</span>
      <input type="date" id="abs-to" value="${window._absTo}"
        style="flex:1;min-width:130px;background:var(--surf);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-size:13px;padding:7px 10px;font-family:inherit;outline:none">
      <button onclick="applyAbsRange()" class="rbtn" style="height:34px;font-size:13px;padding:0 14px">조회</button>
    </div>
  </div>`;

  // 기간 내 날짜 목록
  const from=new Date(window._absFrom+'T12:00:00');
  const to=new Date(window._absTo+'T12:00:00');
  if(isNaN(from)||isNaN(to)||from>to){
    document.getElementById('admin-ct').innerHTML=h+'<div class="empty">날짜를 확인해주세요</div>';return;
  }

  // 학생별 결석 집계
  const counts={};
  CLS.forEach(c=>SCHOOL&&Object.keys(SCHOOL).forEach(name=>{
    if(!counts[name])counts[name]={cls:'',abs:0,dates:[]};
  }));

  // S 데이터에서 반 정보 가져오기
  Object.entries(S).forEach(([dk,sc])=>{
    if(!sc)return;
    const d=new Date(dk+'T12:00:00');
    if(d<from||d>to)return;
    TIMES.forEach(ti=>CLS.forEach(cls=>(sc[ti][cls]||[]).forEach(name=>{
      if(!counts[name])counts[name]={cls,abs:0,dates:[]};
      counts[name].cls=cls;
      const e=(adminData[dk]||{})[ti]?.[name];
      if(e&&e.absent){
        counts[name].abs++;
        counts[name].dates.push(`${d.getMonth()+1}/${d.getDate()}(${DW[d.getDay()]})`);
      }
    })));
  });

  // 반별로 정렬해서 표시
  const hasSomeData=Object.values(counts).some(v=>v.abs>0);
  if(!hasSomeData){
    document.getElementById('admin-ct').innerHTML=h+'<div class="empty">해당 기간 결석 없음</div>';return;
  }

  CLS.forEach(cls=>{
    const studs=Object.entries(counts).filter(([_,v])=>v.cls===cls&&v.abs>0)
      .sort(([_,a],[__,b])=>b.abs-a.abs);
    if(!studs.length)return;
    h+=`<div class="acard"><div class="acard-hd">
      <div style="width:8px;height:8px;border-radius:50%;background:${CC[cls]}"></div>
      <span style="color:${CC[cls]}">${cls}</span>
    </div>`;
    studs.forEach(([name,v])=>{
      const bar=Math.min(100,v.abs*20);
      const bc=v.abs>=5?'var(--red)':v.abs>=3?'var(--t1)':'var(--acc)';
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--brd)">
        <div style="min-width:60px">
          <div style="font-size:14px;font-weight:500">${name}</div>
          <div style="font-size:10px;color:var(--mu)">${SCHOOL[name]||''}</div>
        </div>
        <div style="flex:1">
          <div style="height:6px;border-radius:3px;background:var(--brd);overflow:hidden;margin-bottom:3px">
            <div style="width:${bar}%;height:100%;border-radius:3px;background:${bc};transition:width .4s"></div>
          </div>
          <div style="font-size:11px;color:var(--mu)">${v.dates.slice(0,5).join(', ')}${v.dates.length>5?` 외 ${v.dates.length-5}건`:''}</div>
        </div>
        <div style="font-size:18px;font-weight:700;color:${bc};min-width:30px;text-align:right">${v.abs}</div>
      </div>`;
    });
    h+=`</div>`;
  });

  document.getElementById('admin-ct').innerHTML=h;
}

function applyAbsRange(){
  const f=document.getElementById('abs-from');
  const t=document.getElementById('abs-to');
  if(f)window._absFrom=f.value;
  if(t)window._absTo=t.value;

  // 해당 기간 데이터 로드
  const from=new Date((window._absFrom||'')+'T12:00:00');
  const to=new Date((window._absTo||'')+'T12:00:00');
  if(isNaN(from)||isNaN(to))return;

  const promises=[];
  for(let d=new Date(from);d<=to;d.setDate(d.getDate()+1)){
    const dk=toKey(new Date(d));
    if(!adminData[dk]){
      promises.push(fbGet('att/'+dk).then(v=>{adminData[dk]=v||{}}).catch(()=>{adminData[dk]={}}));
    }
  }
  Promise.all(promises).then(()=>rAbsCount());
}

function rAbsences(ym,days){
  const recs=[];
  for(let i=1;i<=days;i++){
    const dk=`${ym}-${String(i).padStart(2,'0')}`,d=new Date(dk+'T12:00:00'),dd=adminData[dk]||{};
    TIMES.forEach(ti=>Object.entries(dd[ti]||{}).forEach(([name,e])=>{
      if(!e.absent)return;let cls='기타';
      if(S[dk]&&S[dk][ti])CLS.forEach(c=>{if((S[dk][ti][c]||[]).includes(name))cls=c;});
      recs.push({dk,d,ti,name,cls,reason:e.reason||'',contact:e.contact,contact2:e.contact2});
    }));
  }
  if(!recs.length){document.getElementById('admin-ct').innerHTML=`<div class="empty">결석 기록 없음</div><div style="text-align:center"><button class="csv-btn" onclick="dlCSV('${ym}')">CSV 다운로드</button></div>`;return;}
  const byCls={};recs.forEach(r=>{if(!byCls[r.cls])byCls[r.cls]=[];byCls[r.cls].push(r);});
  let h='';
  CLS.forEach(cls=>{
    if(!byCls[cls])return;
    h+=`<div class="acard"><div class="acard-hd"><div style="width:8px;height:8px;border-radius:50%;background:${CC[cls]};flex-shrink:0"></div><span style="color:${CC[cls]}">${cls}</span><span style="margin-left:auto;font-size:11px;color:var(--mu)">${byCls[cls].length}건</span></div>`;
    byCls[cls].forEach(r=>{h+=`<div class="abs-row"><div class="abs-date">${r.d.getMonth()+1}/${r.d.getDate()}(${DW[r.d.getDay()]})<br><span style="color:${TC[r.ti]};font-size:10px">${r.ti}</span></div><div style="flex:1"><div style="display:flex;align-items:center;gap:6px"><span class="abs-name">${r.name}</span></div>${r.reason?`<div class="abs-reason">${r.reason}</div>`:''}<div style="font-size:10px;color:var(--t1);margin-top:2px">${r.contact?'학부모연락 ':''} ${r.contact2?'학생연락':''}</div></div></div>`;});
    h+=`</div>`;
  });
  h+=`<div style="text-align:center"><button class="csv-btn" onclick="dlCSV('${ym}')">CSV 다운로드</button></div>`;
  document.getElementById('admin-ct').innerHTML=h;
}
function rStats(ym,days){
  const ss={};
  for(let i=1;i<=days;i++){
    const dk=`${ym}-${String(i).padStart(2,'0')}`,sc=S[dk];if(!sc)continue;
    const dd=adminData[dk]||{};
    TIMES.forEach(ti=>CLS.forEach(cls=>(sc[ti][cls]||[]).forEach(name=>{
      if(!ss[name])ss[name]={cls,s:0,p:0,a:0,reasons:[]};
      ss[name].s++;const e=(dd[ti]||{})[name]||{};
      if(e.present)ss[name].p++;if(e.absent){ss[name].a++;if(e.reason)ss[name].reasons.push(`${i}일:${e.reason}`);}
    })));
  }
  if(!Object.keys(ss).length){document.getElementById('admin-ct').innerHTML='<div class="empty">데이터 없음</div>';return;}
  let h='';
  CLS.forEach(cls=>{
    const studs=Object.entries(ss).filter(([_,v])=>v.cls===cls);if(!studs.length)return;
    h+=`<div class="acard"><div class="acard-hd"><div style="width:8px;height:8px;border-radius:50%;background:${CC[cls]}"></div><span style="color:${CC[cls]}">${cls}</span></div>`;
    studs.forEach(([name,st])=>{
      const r=st.s?Math.round(st.p/st.s*100):0,bc=r>=80?'var(--green)':r>=60?'var(--t1)':'var(--red)';
      h+=`<div class="stat-row"><div><div class="stat-name">${name}</div><div style="font-size:10px;color:var(--mu)">${SCHOOL[name]||''}</div></div>
        <div class="stat-bars"><div class="sbar-bg"><div class="sbar-fill" style="width:${r}%;background:${bc}"></div></div>
        <div class="sbar-nums"><span>출석 ${st.p}/${st.s}</span><b style="color:${bc}">${r}%</b>${st.a?`<span style="color:var(--red)">결석 ${st.a}회</span>`:''}</div>
        ${st.reasons.length?`<div style="font-size:10px;color:#ff5c5c66">${st.reasons.slice(-2).join(' · ')}</div>`:''}</div></div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('admin-ct').innerHTML=h||'<div class="empty">데이터 없음</div>';
}
function rDays(ym,days){
  let h='<div class="acard">',any=false;
  for(let i=1;i<=days;i++){
    const dk=`${ym}-${String(i).padStart(2,'0')}`,sc=S[dk];if(!sc)continue;
    const d=new Date(dk+'T12:00:00'),dd=adminData[dk]||{};
    let tot=0,p=0,a=0;
    TIMES.forEach(ti=>CLS.forEach(c=>(sc[ti][c]||[]).forEach(n=>{tot++;const e=(dd[ti]||{})[n]||{};if(e.present)p++;if(e.absent)a++;})));
    if(!tot)continue;any=true;const r=Math.round(p/tot*100),bc=r>=80?'var(--green)':r>=60?'var(--t1)':'var(--red)';
    h+=`<div class="day-row"><div class="day-label">${d.getMonth()+1}/${d.getDate()}(${DW[d.getDay()]})</div>
      <div class="stat-bars" style="flex:1"><div class="sbar-bg"><div class="sbar-fill" style="width:${r}%;background:${bc}"></div></div>
      <div class="sbar-nums"><span>출석 ${p}/${tot}</span><b style="color:${bc}">${r}%</b>${a?`<span style="color:var(--red)">결석 ${a}</span>`:''}</div></div></div>`;
  }
  h+=`</div>`;
  document.getElementById('admin-ct').innerHTML=any?h:'<div class="empty">데이터 없음</div>';
}
function dlCSV(ym){
  const days=new Date(parseInt(ym.slice(0,4)),parseInt(ym.slice(5)),0).getDate();
  const rows=[['날짜','요일','타임','반','이름','학교','결석사유','학부모연락','학생연락']];
  for(let i=1;i<=days;i++){
    const dk=`${ym}-${String(i).padStart(2,'0')}`,d=new Date(dk+'T12:00:00'),dd=adminData[dk]||{};
    TIMES.forEach(ti=>{const sc=S[dk];if(!sc)return;CLS.forEach(cls=>(sc[ti][cls]||[]).forEach(name=>{const e=(dd[ti]||{})[name]||{};if(e.absent)rows.push([dk,DW[d.getDay()],ti,cls,name,SCHOOL[name]||'',e.reason||'',e.contact?'완료':'',e.contact2?'완료':'']);}));});
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n')],{type:'text/csv;charset=utf-8'}));
  a.download=`결석현황_${ym}.csv`;a.click();toast('CSV 다운로드 완료 ✓');
}

// ── 시작 ─────────────────────────────────────────────
const _saved=localStorage.getItem('db_url');
if(_saved)DB=_saved;
else localStorage.setItem('db_url',DB); // 기본 URL 저장
launch();
</script>
