<title>출석관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f13;--card:#1e1e28;--surf:#252530;--brd:#2e2e3e;--txt:#f0f0f5;--mu:#7878a0;--acc:#6c6cff;--green:#26de81;--red:#ff5c5c;--t1:#ff9f43;--t2:#5cc8ff;--t3:#a29bfe}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;padding-bottom:max(24px,env(safe-area-inset-bottom))}
/* ── 공통 ── */
.hidden{display:none!important}
.btn-sm{font-size:11px;padding:3px 10px;border-radius:8px;border:1px solid var(--acc);background:transparent;color:var(--acc);cursor:pointer;font-family:inherit}
#toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));left:50%;transform:translateX(-50%);background:var(--green);color:#0f0f13;font-weight:700;font-size:13px;padding:7px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
#sync-err{display:none;background:var(--red);color:#fff;font-size:11px;padding:3px 10px;border-radius:8px;cursor:pointer;flex-shrink:0}

/* ── 설정 화면 ── */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:28px 20px;gap:14px;text-align:center}
.guide-box{background:var(--surf);border-radius:14px;padding:16px 18px;text-align:left;width:100%;font-size:13px;color:var(--mu);line-height:2.1}
.guide-box .step{display:flex;gap:10px;align-items:flex-start}
.step-num{background:var(--acc);color:#fff;font-size:11px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}

let DB='',cur='',att={},drafts={},saveT=null,toastT=null,pollT=null;
let adminYear=2026,adminMonth=7,adminTab=0,adminData={};

function toKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
async function fbGet(p){const r=await fetch(`${DB}/${p}.json`);if(!r.ok)throw r.status;return r.json()}
async function fbPatch(p,d){const r=await fetch(`${DB}/${p}.json`,{method:'PATCH',body:JSON.stringify(d),headers:{'Content-Type':'application/json'}});if(!r.ok)throw r.status;return r.json()}

function connect(){
  const v=document.getElementById('db-url').value.trim().replace(/\/+$/,'');
  if(!v.startsWith('http')){alert('URL을 확인해주세요');return;}
  localStorage.setItem('db_url',v);DB=v;launch();
}
function toast(m,c='var(--green)'){
  const el=document.getElementById('toast');el.textContent=m;el.style.background=c;el.style.opacity='1';
  if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>el.style.opacity='0',2000);
}
function syncOk(){document.getElementById('sync-err').style.display='none'}
function syncFail(){document.getElementById('sync-err').style.display='inline-block'}
function retrySync(){load(cur)}

function launch(){
  document.getElementById('setup').style.display='none';
  document.getElementById('main').style.display='block';
  cur=toKey(new Date());buildNav();load(cur);
  if(pollT)clearInterval(pollT);
  pollT=setInterval(()=>load(cur,false),30000);
}
async function load(dk,show=true){
  if(show)document.getElementById('ct').innerHTML='<div class="closed">불러오는 중…</div>';
  try{const d=await fbGet(`att/${dk}`);att[dk]=d||{};syncOk();}
  catch{if(!att[dk])att[dk]={};syncFail();}
  if(dk===cur)render();
}
function go(dk){
  cur=dk;
  document.getElementById('btn-today').style.display=dk!==toKey(new Date())?'inline-block':'none';
  buildNav();
  if(!att[dk]){document.getElementById('ct').innerHTML='<div class="closed">불러오는 중…</div>';load(dk);}
  else render();
}
function ent(ti,n){return att[cur]?.[ti]?.[n]||{present:false,absent:false,reason:'',contact:false}}
function upd(ti,n,p){
  const e=ent(ti,n),next={...e,...p};
  if(!att[cur])att[cur]={};if(!att[cur][ti])att[cur][ti]={};
  att[cur][ti][n]=next;render();
  if(saveT)clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    try{await fbPatch(`att/${cur}/${ti}`,{[n]:next});toast('저장됨 ✓');syncOk();}
    catch{syncFail();toast('저장 실패','var(--red)');}
  },500);
}
function tgP(ti,n){const e=ent(ti,n);if(!e.absent)upd(ti,n,{present:!e.present});}
function tgA(ti,n){
  const e=ent(ti,n);
  if(e.absent){upd(ti,n,{absent:false,reason:'',contact:false});delete drafts[`${ti}:${n}`];}
  else{upd(ti,n,{absent:true,present:false});drafts[`${ti}:${n}`]=e.reason||'';}
}
function setTag(ti,n,tag){
  drafts[`${ti}:${n}`]=tag;
  const el=document.getElementById(`ri_${ti}_${n.replace(/[^가-힣a-z0-9]/gi,'')}`);
  if(el)el.value=tag;
}
function saveR(ti,n){
  const el=document.getElementById(`ri_${ti}_${n.replace(/[^가-힣a-z0-9]/gi,'')}`);
  const v=el?el.value:'';delete drafts[`${ti}:${n}`];
  upd(ti,n,{reason:v});toast('사유 저장됨 ✓');
}
function editR(ti,n){drafts[`${ti}:${n}`]=ent(ti,n).reason||'';render();}
function tgContact(ti,n){const e=ent(ti,n);upd(ti,n,{contact:!e.contact});}

function buildNav(){
  let h='';
  for(let i=1;i<=31;i++){
    const dk=`2026-07-${String(i).padStart(2,'0')}`;
    const off=S[dk]===null||S[dk]===undefined;
    h+=`<button class="nb${dk===cur?' act':''}${off?' off':''}" onclick="go('${dk}')"><span class="nn">${i}</span><span class="nw">${DW[new Date(dk+'T12:00:00').getDay()]}</span></button>`;
  }
  document.getElementById('nav').innerHTML=h;
  setTimeout(()=>{const b=document.querySelector('.nb.act');if(b)b.scrollIntoView({block:'nearest',inline:'center'});},50);
}
function render(){
  const d=new Date(cur+'T12:00:00');
  document.getElementById('dm').textContent=`${d.getMonth()+1}월 ${d.getDate()}일`;
  document.getElementById('ds').textContent=`(${DW[d.getDay()]})`;
  const sc=S[cur];let tot=0,pres=0,ab=0;
  if(sc)TIMES.forEach(ti=>CLS.forEach(c=>(sc[ti][c]||[]).forEach(n=>{tot++;const e=ent(ti,n);if(e.present)pres++;if(e.absent)ab++;})));
  document.getElementById('stats').innerHTML=sc?`출석<b style="color:var(--green);margin-left:4px">${pres}</b> 결석<b style="color:var(--red);margin:0 0 0 8px">${ab}</b><span style="color:var(--mu)"> / ${tot}명</span>`:'휴강';
  if(!sc){document.getElementById('ct').innerHTML='<div class="closed">🌙&nbsp; 휴강입니다</div>';return;}
  let h='';
  TIMES.forEach(ti=>{
    const all=CLS.flatMap(c=>(sc[ti][c]||[]).map(n=>{return{n,c};}));
    if(!all.length)return;
    const pc=all.filter(({n})=>ent(ti,n).present).length;
    const ac=all.filter(({n})=>ent(ti,n).absent).length;
    const tc=TC[ti];
    h+=`<div class="tblock"><div class="thd"><span class="tbadge" style="background:${tc}22;color:${tc}">${ti}</span><span class="trange">${TR[ti]}</span><span class="tcnt">출<b style="color:var(--green);margin:0 2px">${pc}</b>결<b style="color:var(--red);margin:0 2px">${ac}</b>/${all.length}</span></div>`;
    CLS.forEach(c=>{
      const ns=sc[ti][c]||[];if(!ns.length)return;
      h+=`<div><div class="cls-hd"><div class="cls-dot" style="background:${CC[c]}"></div><span class="cls-nm" style="color:${CC[c]}">${c}</span></div>`;
      ns.forEach(name=>{
        const e=ent(ti,name);const rk=`${ti}:${name}`;const hd=drafts[rk]!==undefined;
        const chk=e.present&&!e.absent;const rid=`ri_${ti}_${name.replace(/[^가-힣a-z0-9]/gi,'')}`;
        h+=`<div><div class="srow" style="${e.absent?'background:#ff5c5c09':e.present?'background:#26de8109':''}">
          <div class="chk${chk?' on':''}" onclick="tgP('${ti}','${name}')">${chk?'<span style="font-size:13px;color:#0f0f13;font-weight:800">✓</span>':''}</div>
          <div class="sinfo"><div class="snm${e.absent?' x':''}">${name}</div><div class="ssc">${SCHOOL[name]||''}</div></div>
          <button class="abtn" onclick="tgA('${ti}','${name}')" style="background:${e.absent?'var(--red)':'#2a2a3a'};color:${e.absent?'#fff':'var(--mu)'}">${e.absent?'출석으로':'결석'}</button>
        </div>`;
        if(e.absent){
          const draft=hd?drafts[rk]:e.reason;
          h+=`<div class="rrow">
            <div class="rtags">${TAGS.map(t=>`<span class="rtag" onclick="setTag('${ti}','${name}','${t}')">${t}</span>`).join('')}</div>
            <div class="rinput-row">
              <input id="${rid}" class="ri" placeholder="결석 사유..." value="${(draft||'').replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')saveR('${ti}','${name}')">
              <button class="rbtn" onclick="saveR('${ti}','${name}')">저장</button>
            </div>
          </div>
          <div class="contact-row">
            <div class="contact-chk${e.contact?' on':''}" onclick="tgContact('${ti}','${name}')">
              ${e.contact?'<span style="font-size:10px;color:#0f0f13;font-weight:800">✓</span>':''}
            </div>
            <span style="font-size:12px;color:${e.contact?'var(--t1)':'var(--mu)'}">학부모 연락 완료</span>
          </div>`;
          if(e.reason&&!hd)h+=`<div class="saved-r"><span style="color:#ff5c5c88">📌 ${e.reason}</span>${e.contact?'<span style="font-size:10px;color:var(--t1)">📞 연락완료</span>':''}<span style="color:var(--mu);cursor:pointer;font-size:11px;margin-left:auto" onclick="editR('${ti}','${name}')">수정</span></div>`;
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('ct').innerHTML=h;
}

// ── 관리자 페이지 ─────────────────────────────────────
function openAdmin(){
  document.getElementById('main').style.display='none';
  document.getElementById('admin').style.display='block';
  adminYear=parseInt(cur.slice(0,4));adminMonth=parseInt(cur.slice(5,7));
  updateAdminMonthLabel();loadAdminData();
}
function closeAdmin(){
  document.getElementById('admin').style.display='none';
  document.getElementById('main').style.display='block';
}
function changeMonth(d){
  adminMonth+=d;
  if(adminMonth>12){adminMonth=1;adminYear++;}
  if(adminMonth<1){adminMonth=12;adminYear--;}
  updateAdminMonthLabel();adminData={};loadAdminData();
}
function updateAdminMonthLabel(){
  document.getElementById('admin-month-label').textContent=`${adminYear}년 ${adminMonth}월`;
}
function switchTab(i){
  adminTab=i;
  ['tab0','tab1','tab2'].forEach((id,j)=>document.getElementById(id).className='tab'+(j===i?' act':''));
  renderAdmin();
}

async function loadAdminData(){
  document.getElementById('admin-ct').innerHTML='<div class="empty-msg">불러오는 중…</div>';
  document.getElementById('sync-err-admin').style.display='none';
  const ym=`${adminYear}-${String(adminMonth).padStart(2,'0')}`;
  const days=new Date(adminYear,adminMonth,0).getDate();
  const promises=[];
  for(let i=1;i<=days;i++){
    const dk=`${ym}-${String(i).padStart(2,'0')}`;
    promises.push(fbGet(`att/${dk}`).then(d=>{adminData[dk]=d||{}}).catch(()=>{adminData[dk]={}}));
  }
  try{await Promise.all(promises);}catch{document.getElementById('sync-err-admin').style.display='inline-block';}
  renderAdmin();
}

function renderAdmin(){
  const ym=`${adminYear}-${String(adminMonth).padStart(2,'0')}`;
  const days=new Date(adminYear,adminMonth,0).getDate();
  if(adminTab===0)renderAbsences(ym,days);
  else if(adminTab===1)renderStats(ym,days);
  else renderDaySummary(ym,days);
}

function renderAbsences(ym,days){
  // 결석 목록 수집
  const records=[];
  for(let i=1;i<=days;i++){
    const dk=`${ym}-${String(i).padStart(2,'0')}`;
    const d=new Date(dk+'T12:00:00');
    const dayData=adminData[dk]||{};
    TIMES.forEach(ti=>{
      const tiData=dayData[ti]||{};
      Object.entries(tiData).forEach(([name,e])=>{
        if(e.absent)records.push({dk,d,ti,name,reason:e.reason||'',contact:e.contact||false});
      });
    });
  }

  if(!records.length){
    document.getElementById('admin-ct').innerHTML=`<div class="empty-msg">😊<br>결석 기록이 없습니다</div>${csvBtn(records,ym)}`;
    return;
  }

  // 반별로 그룹
  const byCls={};
  records.forEach(r=>{
    // 어느 반인지 찾기
    let cls='기타';
    if(S[r.dk]&&S[r.dk][r.ti]){
      CLS.forEach(c=>{if((S[r.dk][r.ti][c]||[]).includes(r.name))cls=c;});
    }
    if(!byCls[cls])byCls[cls]=[];
    byCls[cls].push(r);
  });

  let h='';
  CLS.forEach(cls=>{
    if(!byCls[cls])return;
    h+=`<div class="acard"><div class="acard-hd"><div style="width:8px;height:8px;border-radius:50%;background:${CC[cls]}"></div><h3 style="color:${CC[cls]}">${cls}</h3><span style="margin-left:auto;font-size:12px;color:var(--mu)">${byCls[cls].length}건</span></div>`;
    byCls[cls].forEach(r=>{
      h+=`<div class="abs-row">
        <div class="abs-date">${r.d.getMonth()+1}/${r.d.getDate()}(${DW[r.d.getDay()]})<br><span style="font-size:10px;color:${TC[r.ti]}">${r.ti}</span></div>
        <div><div class="abs-name">${r.name}</div>
        ${r.reason?`<div class="abs-reason">📌 ${r.reason}</div>`:''}
        ${r.contact?`<div class="abs-contact">📞 학부모 연락완료</div>`:''}</div>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=csvBtn(records,ym);
  document.getElementById('admin-ct').innerHTML=h;
}

function renderStats(ym,days){
  const studentStats={};
  for(let i=1;i<=days;i++){
    const dk=`${ym}-${String(i).padStart(2,'0')}`;
    const sc=S[dk];if(!sc)continue;
    const dayData=adminData[dk]||{};
    TIMES.forEach(ti=>{
      CLS.forEach(cls=>{
        (sc[ti][cls]||[]).forEach(name=>{
          if(!studentStats[name])studentStats[name]={cls,scheduled:0,present:0,absent:0,reasons:[]};
          studentStats[name].scheduled++;
          const e=(dayData[ti]||{})[name]||{};
          if(e.present)studentStats[name].present++;
          if(e.absent){studentStats[name].absent++;if(e.reason)studentStats[name].reasons.push(`${i}일:${e.reason}`);}
        });
      });
    });
  }
  if(!Object.keys(studentStats).length){document.getElementById('admin-ct').innerHTML='<div class="empty-msg">데이터가 없습니다</div>';return;}

  let h='';
  CLS.forEach(cls=>{
    const studs=Object.entries(studentStats).filter(([_,v])=>v.cls===cls);
    if(!studs.length)return;
    h+=`<div class="acard"><div class="acard-hd"><div style="width:8px;height:8px;border-radius:50%;background:${CC[cls]}"></div><h3 style="color:${CC[cls]}">${cls}</h3></div>`;
    studs.forEach(([name,st])=>{
      const rate=st.scheduled?Math.round(st.present/st.scheduled*100):0;
      h+=`<div class="stat-row">
        <div><div class="stat-name">${name}</div><div style="font-size:10px;color:var(--mu)">${SCHOOL[name]||''}</div></div>
        <div class="stat-bars">
          <div class="stat-bar"><div class="stat-fill" style="width:${rate}%;background:${rate>=80?'var(--green)':rate>=60?'var(--t1)':'var(--red)'}"></div></div>
          <div class="stat-nums"><span>출석 ${st.present}/${st.scheduled}</span><b style="margin-left:4px;color:${rate>=80?'var(--green)':rate>=60?'var(--t1)':'var(--red)'}">${rate}%</b>${st.absent?`<span style="color:var(--red)">결석 ${st.absent}회</span>`:''}
          </div>
          ${st.reasons.length?`<div style="font-size:11px;color:#ff5c5c88;margin-top:2px">${st.reasons.slice(-3).join(', ')}</div>`:''}</div>
      </div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('admin-ct').innerHTML=h||'<div class="empty-msg">데이터가 없습니다</div>';
}

function renderDaySummary(ym,days){
  let h='<div class="acard">';
  let hasAny=false;
  for(let i=1;i<=days;i++){
    const dk=`${ym}-${String(i).padStart(2,'0')}`;
    const sc=S[dk];if(!sc)continue;
    const d=new Date(dk+'T12:00:00');
    const dayData=adminData[dk]||{};
    let tot=0,pres=0,ab=0;
    TIMES.forEach(ti=>CLS.forEach(c=>(sc[ti][c]||[]).forEach(n=>{tot++;const e=(dayData[ti]||{})[n]||{};if(e.present)pres++;if(e.absent)ab++;})));
    if(!tot)continue;
    hasAny=true;
    const rate=Math.round(pres/tot*100);
    h+=`<div class="day-row">
      <div class="day-label">${d.getMonth()+1}/${d.getDate()}(${DW[d.getDay()]})</div>
      <div class="stat-bars" style="flex:1">
        <div class="stat-bar"><div class="stat-fill" style="width:${rate}%;background:${rate>=80?'var(--green)':rate>=60?'var(--t1)':'var(--red)'}"></div></div>
        <div class="stat-nums"><span>출석 ${pres}/${tot}</span><b style="color:${rate>=80?'var(--green)':rate>=60?'var(--t1)':'var(--red)'};margin-left:4px">${rate}%</b>${ab?`<span style="color:var(--red)">결석 ${ab}</span>`:''}</div>
      </div>
    </div>`;
  }
  h+=`</div>`;
  document.getElementById('admin-ct').innerHTML=hasAny?h:'<div class="empty-msg">데이터가 없습니다</div>';
}

function csvBtn(records,ym){
  return `<button class="csv-btn" onclick="downloadCSV('${ym}')">⬇ CSV 다운로드 (엑셀에서 열기)</button>`;
}
function downloadCSV(ym){
  const days=new Date(parseInt(ym.slice(0,4)),parseInt(ym.slice(5)),0).getDate();
  const rows=[['날짜','요일','타임','반','이름','학교','결석사유','학부모연락']];
  for(let i=1;i<=days;i++){
    const dk=`${ym}-${String(i).padStart(2,'0')}`;
    const d=new Date(dk+'T12:00:00');
    const dayData=adminData[dk]||{};
    TIMES.forEach(ti=>{
      const sc=S[dk];
      if(!sc)return;
      CLS.forEach(cls=>{
        (sc[ti][cls]||[]).forEach(name=>{
          const e=(dayData[ti]||{})[name]||{};
          if(e.absent)rows.push([dk,DW[d.getDay()],ti,cls,name,SCHOOL[name]||'',e.reason||'',e.contact?'완료':'']);
        });
      });
    });
  }
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`결석현황_${ym}.csv`;a.click();
  URL.revokeObjectURL(url);toast('CSV 다운로드 완료 ✓');
}

// ── 시작 ─────────────────────────────────────────────
DB=localStorage.getItem('db_url')||'';
if(DB){launch();}else{document.getElementById('db-url').focus();}
</script>
