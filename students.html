<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>화강암플러스 수강생 관리</title>
<style>
:root {
  --bg:#F5F4F1; --surface:#fff; --border:#E6E4DF;
  --text:#1A1917; --text2:#6B6860; --text3:#9B9890;
  --red:#C0392B; --blue:#2C5F8A; --green:#1A7A45;
  --yellow:#E8A020; --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;min-height:100vh;padding-bottom:80px;padding-top:0;margin:0;}

/* 헤더 */
.hdr{background:var(--red);padding:max(14px,env(safe-area-inset-top,14px)) 14px 8px;position:sticky;top:0;z-index:200;}
.summary{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.sum-box{background:rgba(255,255,255,.15);border-radius:7px;padding:5px 8px;}
.sum-box.full{background:rgba(255,255,255,.1);}
.sum-lbl{color:rgba(255,255,255,.65);font-size:10px;}
.sum-val{color:#fff;font-size:13px;font-weight:700;}
.sum-val.sm{font-size:13px;}
.sum-cls{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
.sum-cls-item{white-space:nowrap;font-size:11px;color:rgba(255,255,255,.85);}
.sum-cls-item span{font-weight:700;font-size:14px;display:block;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.hdr-title{color:#fff;font-size:14px;font-weight:700;}
.hdr-sub{color:rgba(255,255,255,.6);font-size:11px;}
.unpaid-badge{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;cursor:pointer;}

/* 탭 */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:199;overflow-x:auto;overflow-y:hidden;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:70px;padding:11px 6px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;}
.tab.on{color:var(--red);border-bottom-color:var(--red);font-weight:700;}

/* 필터 */
.filters{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;}
.filters::-webkit-scrollbar{display:none;}
.fbtn{padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;}
.fbtn.on{background:var(--text);color:#fff;border-color:var(--text);}

/* 패널 */
.panel{display:none;padding:0 14px 20px;}
.panel.on{display:block;}

/* 섹션 헤더 */
.sec-hdr{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:14px 0 6px;}

/* 카드 */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
.card.paid{border-color:#A8DBC0;}
.card.unpaid{border-color:#F5C0BB;}
.card-top{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.card-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.card-check.done{background:var(--green);border-color:var(--green);}
.card-check.done::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:15px;font-weight:600;}
.card-cls{font-size:12px;color:var(--text2);margin-top:1px;}
.card-right{text-align:right;flex-shrink:0;}
.card-amt{font-size:15px;font-weight:700;color:var(--blue);}
.card-amt.zero{color:var(--text3);}
.card-t{font-size:11px;color:var(--text2);margin-top:1px;}

/* 태그 */
.tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 10px;}
.tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500;}
.tag-re{background:#FCECEA;color:#8B2020;}
.tag-dis{background:#E6F4EE;color:#1A5C3A;}
.tag-ex{background:#FEF3E2;color:#7A4A00;}
.tag-bo{background:#E8F0FA;color:#1A3D6B;}
.tag-fix{background:#F0EEFA;color:#3A2080;}
.tag-pause{background:#F5F0E8;color:#7A6A40;}
.tag-new{background:#FFF8E6;color:#7A5A00;}

/* 상세 */
.detail{display:none;border-top:1px solid var(--border);padding:12px 14px;}
.detail.on{display:block;}
.d-row{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0;font-size:13px;border-bottom:1px dashed var(--border);}
.d-row:last-of-type{border-bottom:none;}
.d-lbl{color:var(--text2);flex-shrink:0;margin-right:8px;}
.d-val{font-weight:500;text-align:right;word-break:break-all;}
.d-dates{font-size:11px;color:var(--text2);line-height:1.7;margin-top:6px;background:var(--bg);padding:8px 10px;border-radius:var(--radius-sm);}

/* 편집 버튼 */
.edit-btn{display:inline-flex;align-items:center;gap:4px;margin-top:10px;padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:12px;color:var(--text2);cursor:pointer;}
.save-btn{display:inline-flex;align-items:center;gap:4px;margin-top:10px;margin-left:6px;padding:7px 14px;border:none;border-radius:var(--radius-sm);background:var(--blue);font-size:12px;color:#fff;cursor:pointer;}

/* 편집 폼 */
.edit-form{margin-top:10px;display:none;}
.edit-form.on{display:block;}
.ef-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;}
.ef-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;font-family:inherit;margin-bottom:10px;background:var(--bg);}
.ef-input:focus{outline:none;border-color:var(--blue);}
textarea.ef-input{resize:vertical;min-height:70px;}

/* 미납 모달 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;}
.overlay.on{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{font-size:22px;color:var(--text2);cursor:pointer;padding:0 4px;}
.unpaid-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.unpaid-item:last-child{border-bottom:none;}
.unpaid-name{font-size:14px;font-weight:600;}
.unpaid-cls{font-size:12px;color:var(--text2);}
.unpaid-amt{font-size:14px;font-weight:700;color:var(--red);}
.unpaid-total{display:flex;justify-content:space-between;padding:12px 0 0;margin-top:4px;}
.unpaid-total-lbl{font-size:13px;font-weight:600;color:var(--text2);}
.unpaid-total-amt{font-size:16px;font-weight:700;color:var(--red);}

/* 잔여타임 뱃지 */
.remain-badge{display:inline-block;background:#FEF3E2;color:#7A4A00;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;margin-top:4px;}


.ai-loading{text-align:center;padding:16px;color:var(--text2);font-size:13px;display:none;}
.ai-loading.on{display:block;}
.ai-month-sel{display:flex;gap:8px;margin-bottom:12px;}
.ai-month-btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:13px;cursor:pointer;font-weight:500;color:var(--text2);}
.ai-month-btn.on{background:var(--blue);color:#fff;border-color:var(--blue);}

/* 검색 */
.search-wrap{padding:8px 14px 2px;position:sticky;top:52px;z-index:198;background:var(--bg);}
.search-input{width:100%;padding:9px 14px 9px 14px;border:1px solid var(--border);border-radius:999px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;}
.search-input:focus{border-color:var(--blue);}
.search-wrap-inner{position:relative;}

.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;cursor:pointer;display:none;}

/* 탑 버튼 */
.top-btn{position:fixed;bottom:24px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:20px;cursor:pointer;z-index:299;box-shadow:0 4px 14px rgba(0,0,0,.2);display:none;align-items:center;justify-content:center;transition:opacity .2s;}
.top-btn.show{display:flex;}
</style>
</head>

</div>

<div class="search-wrap">
  <div class="search-wrap-inner">

    <span class="search-clear" id="searchClear" onclick="clearSearch()">×</span>
  </div>
</div>

<button class="top-btn" id="topBtn" onclick="scrollToTop()">↑</button>



<div class="panel on" id="panel-jul">

<div class="panel" id="panel-aug">

    <button class="fbtn" onclick="filterCls('aug','취미반',this)">취미반</button>
    
  </div>
  <div id="list-aug"></div>
</div>

<div class="overlay" id="unpaidOverlay" onclick="closeUnpaid(event)">
  <div class="modal">
    <div class="modal-hdr">

// ── 스토리지 ──
const FB_URL='https://hwa1-c1ad9-default-rtdb.firebaseio.com';
function loadDB(){
  try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):null;}catch(e){return null;}
}
function saveDB(d){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){}
  fetch(`${FB_URL}/students.json`,{method:'PUT',body:JSON.stringify(d),headers:{'Content-Type':'application/json'}}).catch(()=>{});
}
async function syncFromFirebase(){
  try{
    const r=await fetch(`${FB_URL}/students.json`);
    if(!r.ok)return;const d=await r.json();if(!d)return;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(d));db=d;
  }catch(e){}
}
function getDB() {
  const saved = loadDB();
  if (!saved) { saveDB(initData); return JSON.parse(JSON.stringify(initData)); }
  // merge new students
  ['jul','aug'].forEach(m => {
    initData[m].forEach(init => {
      if (!saved[m].find(s => s.id === init.id)) saved[m].push(init);
    });
  });
  return saved;
}

let db = getDB();
let currentFilter = { jul:'all', aug:'all' };
let searchQuery = '';

// ── 렌더 ──
function fmt(n) { return n === 0 ? '0원' : n.toLocaleString('ko-KR') + '원'; }

function tagHtml(t) {
  const [k, ...rest] = t.split(':');
  const label = rest.join(':');
  const cls = k === 'fix' ? 'tag-fix' : k === 'pause' ? 'tag-pause' :
    k === 're' ? 'tag-re' : k === 'dis' ? 'tag-dis' :
    k === 'bo' ? 'tag-bo' : k === 'new' ? 'tag-new' : 'tag-fix';
  return `<span class="tag ${cls}">${label}</span>`;
}



function getActiveMonth() {
  return document.getElementById('panel-aug').classList.contains('on') ? 'aug' : 'jul';
}

function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('searchClear').style.display = val ? 'block' : 'none';
  render(getActiveMonth());
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  searchQuery = '';
  render(getActiveMonth());
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('scroll', () => {
  const btn = document.getElementById('topBtn');
  if (window.scrollY > 200) btn.classList.add('show');
  else btn.classList.remove('show');
});

function render(month) {
  const filter = currentFilter[month];
  const list = document.getElementById('list-' + month);
  list.innerHTML = '';
  const items = db[month].filter(s => {
    if (searchQuery && !s.name.toLowerCase().includes(searchQuery)) return false;
    if (filter === 'all') return true;
    if (filter === '미납') {
      const today = new Date();
      const cutoff = month === 'jul' ? new Date(2026, 6, 10) : new Date(2026, 7, 10);
      if (today < cutoff) return false;
      return !s.paid && s.amount > 0;
    }
    return s.cls === filter;
  });

  const groups = {};
  items.forEach(s => {
    if (!groups[s.cls]) groups[s.cls] = [];
    groups[s.cls].push(s);
  });

  const clsOrder = ['입시반','예비반','중등반','취미반'];
  clsOrder.forEach(cls => {
    if (!groups[cls]) return;
    const hdr = document.createElement('div');
    hdr.className = 'sec-hdr';
    hdr.textContent = cls;
    list.appendChild(hdr);
    groups[cls].forEach(s => {
    const card = makeCard(s, month);
    if (card) list.appendChild(card);
  });
  });
}

function makeCard(s, month) {
  // 수강 없음(amount=0, remain 없음) 학생은 숨김
  if (s.amount === 0 && s.remain == null) return null;
  const div = document.createElement('div');
  div.className = 'card' + (s.paid ? ' paid' : (s.amount > 0 ? ' unpaid' : ''));
  div.id = 'card-' + s.id;

  const amtDisplay = s.remain != null
    ? `잔여 ${s.remain}T`
    : (s.amount === 0 ? '수강없음' : fmt(s.amount));

  const tDisplay = s.remain != null
    ? '수강 없음'
    : (s.totalT > 0 ? `총 ${s.totalT}T` : (s.fixed ? '고정요금' : ''));

  const tagsStr = s.tags.map(t => tagHtml(t)).join('');
  const remainBadge = s.remain != null ? `<div class="remain-badge">잔여 ${s.remain}T</div>` : '';

  div.innerHTML = `
    <div class="card-top" onclick="toggleDetail('${s.id}','${month}')">
      <div class="card-check ${s.paid ? 'done' : ''}" onclick="togglePaid(event,'${s.id}','${month}')"></div>
      <div class="card-info">
        <div class="card-name">${s.name}</div>
        <div class="card-cls">${s.schedule.split('\n')[0]}</div>
        ${remainBadge}
      </div>
      <div class="card-right">
        <div class="card-amt ${s.amount === 0 && s.remain === null ? 'zero' : ''}">${amtDisplay}</div>
        <div class="card-t">${tDisplay}</div>
      </div>
    </div>
    ${tagsStr ? `<div class="tags">${tagsStr}</div>` : ''}
    <div class="detail" id="detail-${s.id}">
      <div class="d-row"><span class="d-lbl">수업 요일</span><span class="d-val">${s.schedule.replace(/\n/g,'<br>')}</span></div>
      ${s.days ? `<div class="d-row"><span class="d-lbl">수업 일자/시수</span><span class="d-val">${s.days.replace(/\n/g,'<br>')}</span></div>` : ''}
      ${s.absence > 0 ? `<div class="d-row"><span class="d-lbl">결석 차감</span><span class="d-val" style="color:var(--red)">-${s.absence}T</span></div>` : ''}
      <div class="d-row"><span class="d-lbl">수강료</span><span class="d-val" style="color:var(--blue);font-weight:700;">${s.remain !== null ? '해당없음 (잔여'+s.remain+'T)' : fmt(s.amount)}</span></div>
      <div class="d-row"><span class="d-lbl">결제여부</span><span class="d-val" style="color:${s.paid?'var(--green)':'var(--red)'}">${s.paid ? '결제완료' : '미납'}</span></div>
      ${s.memo ? `<div class="d-dates">${s.memo}</div>` : ''}
      <button class="edit-btn" onclick="openEdit('${s.id}','${month}')">편집</button>
      <div class="edit-form" id="edit-${s.id}">
        <div class="ef-label">수업 요일/일정</div>
        <textarea class="ef-input" id="ef-schedule-${s.id}">${s.schedule}</textarea>
        <div class="ef-label">수업 일자 / 시수 내역</div>
        <textarea class="ef-input" id="ef-days-${s.id}">${s.days}</textarea>
        <div class="ef-label">결석 차감 (T)</div>
        <input class="ef-input" type="number" id="ef-abs-${s.id}" value="${s.absence}">
        <div class="ef-label">총 시수 (T)</div>
        <input class="ef-input" type="number" id="ef-total-${s.id}" value="${s.totalT}">
        <div class="ef-label">수강료 (원)</div>
        <input class="ef-input" type="number" id="ef-amt-${s.id}" value="${s.amount}">
        ${s.remain !== null ? `<div class="ef-label">잔여 타임 (T)</div><input class="ef-input" type="number" id="ef-remain-${s.id}" value="${s.remain}">` : ''}
        <div class="ef-label">메모</div>
        <textarea class="ef-input" id="ef-memo-${s.id}">${s.memo}</textarea>
        <button class="save-btn" onclick="saveEdit('${s.id}','${month}')">저장</button>
        <button class="edit-btn" style="margin-left:0;margin-top:0;" onclick="cancelEdit('${s.id}')">취소</button>
      </div>
    </div>
  `;
  return div;
}

function toggleDetail(id, month) {
  const det = document.getElementById('detail-' + id);
  det.classList.toggle('on');
}

function togglePaid(e, id, month) {
  e.stopPropagation();
  const s = db[month].find(x => x.id === id);
  s.paid = !s.paid;
  saveDB(db);
  render(month);
  renderSummary(month);
}

function openEdit(id, month) {
  document.getElementById('edit-' + id).classList.add('on');
  document.getElementById('detail-' + id).classList.add('on');
}
function cancelEdit(id) {
  document.getElementById('edit-' + id).classList.remove('on');
}

function saveEdit(id, month) {
  const s = db[month].find(x => x.id === id);
  s.schedule = document.getElementById('ef-schedule-' + id).value;
  s.days = document.getElementById('ef-days-' + id).value;
  s.absence = parseInt(document.getElementById('ef-abs-' + id).value) || 0;
  s.totalT = parseInt(document.getElementById('ef-total-' + id).value) || 0;
  s.amount = parseInt(document.getElementById('ef-amt-' + id).value) || 0;
  s.memo = document.getElementById('ef-memo-' + id).value;
  const remEl = document.getElementById('ef-remain-' + id);
  if (remEl) s.remain = parseInt(remEl.value) || 0;
  saveDB(db);
  render(month);
  renderSummary(month);
  // 다시 펼치기
  setTimeout(() => {
    const det = document.getElementById('detail-' + id);
    if (det) det.classList.add('on');
  }, 50);
}

function filterCls(month, cls, btn) {
  currentFilter[month] = cls;
  document.querySelectorAll('#panel-' + month + ' .fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render(month);
}

function switchTab(month, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('panel-' + month).classList.add('on');
  renderSummary(month);
  document.getElementById('hdrSub').textContent = month === 'jul' ? '2026년 7월' : '2026년 8월 (예정)';
}

function renderSummary(month) {
  const items = db[month];
  const total = items.reduce((a,s) => a + s.amount, 0);
  const paid = items.filter(s => s.paid).reduce((a,s) => a + s.amount, 0);
  const unpaid = total - paid;

  const clsList = ['입시반','예비반','중등반','취미반'];
  const clsSums = {};
  clsList.forEach(c => { clsSums[c] = 0; });
  items.forEach(s => { if (clsSums[s.cls] !== undefined) clsSums[s.cls] += s.amount; });

  const fmt2 = n => n.toLocaleString('ko-KR') + '원';

  const box = document.getElementById('summaryBox');
  box.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
      <div class="sum-box">
        <div class="sum-lbl">총 수강료</div>
        <div class="sum-val">${fmt2(total)}</div>
      </div>
      <div class="sum-box">
        <div class="sum-lbl">결제 완료</div>
        <div class="sum-val">${fmt2(paid)}</div>
      </div>
    </div>
    <div class="sum-box full">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none">
        
        ${clsList.map(c => `<span style="white-space:nowrap;font-size:11px;color:#fff"><span style="opacity:.7">${c}</span> <b>${fmt2(clsSums[c])}</b></span>`).join('<span style="color:rgba(255,255,255,.3)">·</span>')}
      </div>
    </div>
  `;
}

function openUnpaid() {
  const ul = document.getElementById('unpaidList');
  ul.innerHTML = '';
  let total = 0;
  // 미납 기준: 해당 월 10일 이후
  const today = new Date();
  const months = [
    { key:'jul', month:6 },
    { key:'aug', month:7 }
  ].filter(m => {
    const cutoff = new Date(2026, m.month, 10);
    return today >= cutoff;
  });
  months.forEach(({key: month}) => {
    const label = month === 'jul' ? '7월' : '8월';
    db[month].filter(s => !s.paid && s.amount > 0).forEach(s => {
      total += s.amount;
      ul.innerHTML += `
        <div class="unpaid-item">
          <div><div class="unpaid-name">${s.name} <span style="font-size:11px;color:var(--text3)">${label}</span></div><div class="unpaid-cls">${s.cls}</div></div>
          <div class="unpaid-amt">${fmt(s.amount)}</div>
        </div>`;
    });
  });
  if (ul.innerHTML === '') ul.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">미납 없음</div>';
  document.getElementById('unpaidTotal').textContent = fmt(total);
  document.getElementById('unpaidOverlay').classList.add('on');
}
function closeUnpaid(e) {
  if (!e || e.target === document.getElementById('unpaidOverlay')) {
    document.getElementById('unpaidOverlay').classList.remove('on');
  }
}

syncFromFirebase().then(()=>{render('jul');render('aug');renderSummary('jul');});
