<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>화강암플러스 수강생 관리</title>
<style>
:root {
  --bg:#F5F4F1; --surface:#fff; --border:#E6E4DF;
  --text:#1A1917; --text2:#6B6860; --text3:#9B9890;
  --red:#C0392B; --blue:#2C5F8A; --green:#1A7A45;
  --yellow:#E8A020; --purple:#5B3FA0;
  --radius:14px; --radius-sm:8px; --sidebar:280px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}

/* ── 공통 ── */
.tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500;}
.tag-re{background:#FCECEA;color:#8B2020;}
.tag-dis{background:#E6F4EE;color:#1A5C3A;}
.tag-ex{background:#FEF3E2;color:#7A4A00;}
.tag-bo{background:#E8F0FA;color:#1A3D6B;}
.tag-fix{background:#F0EEFA;color:#3A2080;}
.tag-pause{background:#F5F0E8;color:#7A6A40;}
.tag-new{background:#FFF8E6;color:#7A5A00;}
.tag-special{background:#F0EEFA;color:#3A2080;}
.remain-badge{display:inline-block;background:#FEF3E2;color:#7A4A00;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;margin-top:2px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;}
.overlay.on{display:flex;}

/* ════════════════════════
   모바일 레이아웃 (< 900px)
   ════════════════════════ */
#app-mob{display:block;}
#app-pc{display:none;}

#app-mob{background:var(--bg);color:var(--text);font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;min-height:100vh;padding-bottom:80px;}

/* 모바일 헤더 */
#app-mob .sticky-wrap{position:sticky;top:0;z-index:200;}
#app-mob .hdr{background:var(--red);padding:max(14px,env(safe-area-inset-top,14px)) 14px 8px;}
#app-mob .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
#app-mob .hdr-title{color:#fff;font-size:14px;font-weight:700;}
#app-mob .hdr-sub{color:rgba(255,255,255,.6);font-size:11px;}
#app-mob .unpaid-badge{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;cursor:pointer;}
#app-mob .summary{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
#app-mob .sum-box{background:rgba(255,255,255,.15);border-radius:7px;padding:5px 8px;}
#app-mob .sum-box.full{background:rgba(255,255,255,.1);}
#app-mob .sum-lbl{color:rgba(255,255,255,.65);font-size:10px;}
#app-mob .sum-val{color:#fff;font-size:13px;font-weight:700;}
#app-mob .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
#app-mob .tabs::-webkit-scrollbar{display:none;}
#app-mob .tab{flex:1;min-width:70px;padding:11px 6px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2.5px solid transparent;cursor:pointer;}
#app-mob .tab.on{color:var(--red);border-bottom-color:var(--red);font-weight:700;}
#app-mob .filters{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;}
#app-mob .filters::-webkit-scrollbar{display:none;}
#app-mob .fbtn{padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;}
#app-mob .fbtn.on{background:var(--text);color:#fff;border-color:var(--text);}
#app-mob .panel{display:none;padding:0 14px 20px;}
#app-mob .panel.on{display:block;}
#app-mob .sec-hdr{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.07em;padding:14px 0 6px;}
#app-mob .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
#app-mob .card.paid{border-color:#A8DBC0;}
#app-mob .card.unpaid{border-color:#F5C0BB;}
#app-mob .card-top{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
#app-mob .card-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
#app-mob .card-check.done{background:var(--green);border-color:var(--green);}
#app-mob .card-check.done::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
#app-mob .card-info{flex:1;min-width:0;}
#app-mob .card-name{font-size:15px;font-weight:600;}
#app-mob .card-cls{font-size:12px;color:var(--text2);margin-top:1px;}
#app-mob .card-right{text-align:right;flex-shrink:0;}
#app-mob .card-amt{font-size:15px;font-weight:700;color:var(--blue);}
#app-mob .card-amt.zero{color:var(--text3);}
#app-mob .card-t{font-size:11px;color:var(--text2);margin-top:1px;}
#app-mob .tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 10px;}
#app-mob .detail{display:none;border-top:1px solid var(--border);padding:12px 14px;}
#app-mob .detail.on{display:block;}
#app-mob .d-row{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0;font-size:13px;border-bottom:1px dashed var(--border);}
#app-mob .d-row:last-of-type{border-bottom:none;}
#app-mob .d-lbl{color:var(--text2);flex-shrink:0;margin-right:8px;}
#app-mob .d-val{font-weight:500;text-align:right;word-break:break-all;}
#app-mob .d-dates{font-size:11px;color:var(--text2);line-height:1.7;margin-top:6px;background:var(--bg);padding:8px 10px;border-radius:var(--radius-sm);}
#app-mob .edit-btn{display:inline-flex;align-items:center;gap:4px;margin-top:10px;padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:12px;color:var(--text2);cursor:pointer;}
#app-mob .save-btn{display:inline-flex;align-items:center;gap:4px;margin-top:10px;margin-left:6px;padding:7px 14px;border:none;border-radius:var(--radius-sm);background:var(--blue);font-size:12px;color:#fff;cursor:pointer;}
#app-mob .edit-form{margin-top:10px;display:none;}
#app-mob .edit-form.on{display:block;}
#app-mob .ef-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;}
#app-mob .ef-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;font-family:inherit;margin-bottom:10px;background:var(--bg);}
#app-mob .ef-input:focus{outline:none;border-color:var(--blue);}
textarea#app-mob .ef-input{resize:vertical;min-height:70px;}
#app-mob .search-wrap{padding:8px 14px 2px;position:sticky;top:52px;z-index:198;background:var(--bg);}
#app-mob .search-input{width:100%;padding:9px 14px;border:1px solid var(--border);border-radius:999px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;}
#app-mob .search-input:focus{border-color:var(--blue);}
#app-mob .search-wrap-inner{position:relative;}
#app-mob .search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;cursor:pointer;display:none;}
#app-mob .top-btn{position:fixed;bottom:24px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:20px;cursor:pointer;z-index:299;box-shadow:0 4px 14px rgba(0,0,0,.2);display:none;align-items:center;justify-content:center;}
#app-mob .top-btn.show{display:flex;}
/* 모바일 미납 모달 */
#app-mob .overlay{align-items:flex-end;}
#app-mob .modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:80vh;overflow-y:auto;}
#app-mob .modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
#app-mob .modal-title{font-size:16px;font-weight:700;}
#app-mob .modal-close{font-size:22px;color:var(--text2);cursor:pointer;padding:0 4px;}
#app-mob .unpaid-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
#app-mob .unpaid-item:last-child{border-bottom:none;}
#app-mob .unpaid-name{font-size:14px;font-weight:600;}
#app-mob .unpaid-cls{font-size:12px;color:var(--text2);}
#app-mob .unpaid-amt{font-size:14px;font-weight:700;color:var(--red);}
#app-mob .unpaid-total{display:flex;justify-content:space-between;padding:12px 0 0;margin-top:4px;}

/* ════════════════════════
   PC 레이아웃 (≥ 900px)
   ════════════════════════ */
#app-pc{font-family:-apple-system,'Segoe UI',sans-serif;height:100vh;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--text);}
#app-pc .topbar{background:var(--red);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#app-pc .topbar-title{color:#fff;font-size:17px;font-weight:700;}
#app-pc .topbar-right{display:flex;align-items:center;gap:10px;position:relative;}
#app-pc .s-toggle-btn{background:none;border:none;color:rgba(255,255,255,.75);font-size:20px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1;}
#app-pc .s-cls-panel{display:flex;align-items:center;gap:0;overflow:hidden;max-width:0;opacity:0;transition:max-width .35s ease,opacity .25s ease;position:absolute;right:28px;top:50%;transform:translateY(-50%);background:var(--red);z-index:1;white-space:nowrap;}
#app-pc .s-cls-panel.open{max-width:500px;opacity:1;}
#app-pc .s-cls-item{display:flex;flex-direction:column;align-items:flex-end;padding:0 10px;border-right:1px solid rgba(255,255,255,.15);flex-shrink:0;}
#app-pc .s-cls-item:last-child{border-right:none;padding-right:0;}
#app-pc .s-cls-name{font-size:10px;color:rgba(255,255,255,.55);margin-bottom:1px;}
#app-pc .s-cls-amt{font-size:12px;font-weight:700;color:#fff;}
#app-pc .s-vdiv{width:1px;height:28px;background:rgba(255,255,255,.2);flex-shrink:0;}
#app-pc .s-main-item{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
#app-pc .s-lbl{font-size:10px;color:rgba(255,255,255,.55);margin-bottom:1px;}
#app-pc .s-val{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;}
#app-pc .s-val.remain{color:#FFB3AE;}
#app-pc .unpaid-btn{background:rgba(0,0,0,.2);color:#fff;border:1px solid rgba(255,255,255,.15);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
#app-pc .main{display:flex;flex:1;overflow:hidden;}
#app-pc .sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#app-pc .sidebar-month{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);}
#app-pc .sm-btn{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);border:1px solid var(--border);background:transparent;cursor:pointer;border-radius:8px;}
#app-pc .sm-btn.on{background:var(--red);color:#fff;border-color:var(--red);font-weight:700;}
#app-pc .sidebar-search{padding:12px 12px 8px;}
#app-pc .search-input{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;background:var(--bg);outline:none;}
#app-pc .search-input:focus{border-color:var(--blue);}
#app-pc .class-filters{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 8px;}
#app-pc .cf-btn{padding:3px 10px;border-radius:999px;border:1px solid var(--border);background:transparent;font-size:11px;color:var(--text2);cursor:pointer;}
#app-pc .cf-btn.on{background:var(--text);color:#fff;border-color:var(--text);}
#app-pc .student-list{flex:1;overflow-y:auto;padding:4px 8px 12px;}
#app-pc .sec-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;padding:10px 6px 4px;text-transform:uppercase;}
#app-pc .s-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;}
#app-pc .s-item:hover{background:var(--bg);}
#app-pc .s-item.active{background:#EBF1F8;}
#app-pc .s-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer;transition:all .15s;}
#app-pc .s-check.done{background:var(--green);border-color:var(--green);}
#app-pc .s-info{flex:1;min-width:0;}
#app-pc .s-name{font-size:13px;font-weight:600;}
#app-pc .s-cls{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#app-pc .s-amt{font-size:12px;font-weight:700;color:var(--blue);white-space:nowrap;flex-shrink:0;}
#app-pc .s-amt.zero{color:var(--text3);}
#app-pc .content{flex:1;overflow-y:auto;padding:24px;}
#app-pc .no-select{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:15px;}
#app-pc .detail-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px;}
#app-pc .dcard{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:16px;}
#app-pc .dcard-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em;}
#app-pc .drow{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bg);}
#app-pc .drow:last-child{border-bottom:none;}
#app-pc .dlbl{font-size:13px;color:var(--text2);flex-shrink:0;margin-right:12px;}
#app-pc .dval{font-size:13px;font-weight:500;text-align:right;word-break:break-word;}
#app-pc .dval.amount{color:var(--blue);font-size:16px;font-weight:700;}
#app-pc .dval.red{color:var(--red);}
#app-pc .dval.green{color:var(--green);}
#app-pc .paid-toggle{display:flex;align-items:center;gap:8px;margin-top:12px;}
#app-pc .paid-toggle-btn{padding:7px 20px;border-radius:999px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
#app-pc .paid-toggle-btn.unpaid{background:#FCECEA;color:var(--red);}
#app-pc .paid-toggle-btn.paid{background:#E6F4EE;color:var(--green);}
#app-pc .edit-inline{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
#app-pc .ei-row{display:flex;gap:8px;align-items:center;}
#app-pc .ei-label{font-size:12px;color:var(--text2);width:80px;flex-shrink:0;}
#app-pc .ei-input,#app-pc .ei-textarea{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;background:var(--bg);outline:none;}
#app-pc .ei-textarea{resize:vertical;min-height:60px;}
#app-pc .ei-input:focus,#app-pc .ei-textarea:focus{border-color:var(--blue);}
#app-pc .btn-row{display:flex;gap:8px;margin-top:8px;}
#app-pc .btn{padding:7px 16px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;}
#app-pc .btn-blue{background:var(--blue);color:#fff;}
#app-pc .btn-gray{background:var(--border);color:var(--text);}
#app-pc .msg-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;}
#app-pc .msg-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;gap:4px;flex-wrap:wrap;}
#app-pc .msg-tab{padding:10px 12px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
#app-pc .msg-tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}
#app-pc .msg-body{flex:1;padding:16px;overflow-y:auto;min-height:300px;}
#app-pc .msg-text{font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--text);background:var(--bg);padding:14px;border-radius:var(--radius-sm);}
#app-pc .msg-copy-btn{margin:12px 16px 16px;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;}
#app-pc .msg-empty{color:var(--text3);font-size:13px;text-align:center;padding:40px 16px;}
/* PC 미납 모달 */
#app-pc .overlay{align-items:center;}
#app-pc .modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:400px;max-height:80vh;overflow-y:auto;}
#app-pc .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
#app-pc .modal-close{font-size:20px;cursor:pointer;color:var(--text2);}
#app-pc .unpaid-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
#app-pc .unpaid-row:last-child{border-bottom:none;}
#app-pc .unpaid-name{font-size:14px;font-weight:600;}
#app-pc .unpaid-cls{font-size:12px;color:var(--text2);}
#app-pc .unpaid-amt{font-size:14px;font-weight:700;color:var(--red);}
#app-pc .unpaid-total-row{display:flex;justify-content:space-between;padding:14px 0 0;margin-top:8px;border-top:2px solid var(--border);}
</style>
</head>
<body>

<!-- ── 모바일 앱 ── -->
<div id="app-mob">
<div class="sticky-wrap">
  <div class="hdr" id="mainHdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-title">화강암플러스 수강생 관리</div>
        <div class="hdr-sub" id="hdrSub"></div>
      </div>
      <span id="fb-status" style="font-size:10px;color:rgba(255,255,255,.7);margin-right:8px"></span>
      <div class="unpaid-badge" onclick="openUnpaid()">미납 확인</div>
    </div>
    <div class="summary" id="summaryBox" style="min-height:20px;color:white;font-size:12px">로딩중...</div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="mobSwitchTab('jul',this)">7월</div>
    <div class="tab" onclick="mobSwitchTab('aug',this)">8월(예정)</div>
  </div>
</div>
<div class="search-wrap">
  <div class="search-wrap-inner">
    <input class="search-input" id="mobSearchInput" type="text" placeholder="이름 검색..." oninput="mobOnSearch(this.value)">
    <span class="search-clear" id="searchClear" onclick="mobClearSearch()">×</span>
  </div>
</div>
<button class="top-btn" id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="panel on" id="panel-jul">
  <div class="filters">
    <button class="fbtn on" onclick="mobFilterCls('jul','all',this)">전체</button>
    <button class="fbtn" onclick="mobFilterCls('jul','입시반',this)">입시반</button>
    <button class="fbtn" onclick="mobFilterCls('jul','예비반',this)">예비반</button>
    <button class="fbtn" onclick="mobFilterCls('jul','중등반',this)">중등반</button>
    <button class="fbtn" onclick="mobFilterCls('jul','취미반',this)">취미반</button>
    <button class="fbtn" onclick="mobFilterCls('jul','미납',this)">미납</button>
  </div>
  <div id="list-jul"></div>
</div>
<div class="panel" id="panel-aug">
  <div class="filters">
    <button class="fbtn on" onclick="mobFilterCls('aug','all',this)">전체</button>
    <button class="fbtn" onclick="mobFilterCls('aug','입시반',this)">입시반</button>
    <button class="fbtn" onclick="mobFilterCls('aug','예비반',this)">예비반</button>
    <button class="fbtn" onclick="mobFilterCls('aug','중등반',this)">중등반</button>
    <button class="fbtn" onclick="mobFilterCls('aug','취미반',this)">취미반</button>
  </div>
  <div id="list-aug"></div>
</div>
<!-- 모바일 미납 모달 -->
<div class="overlay" id="mobUnpaidOverlay" onclick="if(event.target===this)closeMobUnpaid()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">미납 현황</div>
      <span class="modal-close" onclick="closeMobUnpaid()">×</span>
    </div>
    <div id="mobUnpaidList"></div>
    <div class="unpaid-total">
      <span style="font-weight:600;">총 미납액</span>
      <span style="font-size:16px;font-weight:700;color:var(--red)" id="mobUnpaidTotal"></span>
    </div>
  </div>
</div>
</div><!-- /app-mob -->

<!-- ── PC 앱 ── -->
<div id="app-pc">
<div class="topbar">

function loadDB(){ return JSON.parse(JSON.stringify(initData)); }
function saveDB(d){
  const paidMap = {};
  ['jul','aug'].forEach(m=>{ if(d[m]) d[m].forEach(s=>{ paidMap[s.id]=s.paid; }); });
  fetch(`${FB_URL}/paid.json`,{method:'PUT',body:JSON.stringify(paidMap),headers:{'Content-Type':'application/json'}}).catch(()=>{});
}
async function syncFromFirebase(){
  const statusEl = document.getElementById('fb-status');
  try {
    // paid.json + schedule_backup.json + students_list.json 병렬 fetch
    const [r, br, sr] = await Promise.all([
      fetch(`${FB_URL}/paid.json?_=${Date.now()}`),
      fetch(`${FB_URL}/schedule_backup.json?_=${Date.now()}`),
      fetch(`${FB_URL}/students_list.json?_=${Date.now()}`)
    ]);
    if(!r.ok){ if(statusEl)statusEl.textContent='Firebase 오류: '+r.status; return; }
    const paidMap = await r.json();
    if(paidMap && typeof paidMap==='object'){
      ['jul','aug'].forEach(m=>{ if(db[m]) db[m].forEach(s=>{ if(paidMap[s.id]!==undefined) s.paid=paidMap[s.id]; }); });
    }

    // students_list.json - 신규 학생 db에 동적 추가
    if(sr&&sr.ok){
      try{
        const stuList = await sr.json();
        if(stuList&&typeof stuList==='object'){
          ['jul','aug'].forEach(mon=>{
            if(!db[mon])return;
            Object.entries(stuList).forEach(([cls,stus])=>{
              if(!Array.isArray(stus))return;
              stus.forEach(stu=>{
                if(!stu.name)return;
                const id=mon+'_'+stu.name;
                if(db[mon].find(s=>s.id===id))return; // 기존 학생 스킵
                db[mon].push({
                  id, name:stu.name, cls,
                  tags:[], schedule:(stu.days||[]).join(','), days:'',
                  absence:0, totalT:0, amount:0,
                  fixed:false, paid:false, memo:'', remain:null
                });
              });
            });
          });
        }
      }catch(e){console.log('students_list 로드 실패',e);}
    }

    // schedule_backup.json - 정규/특강 분리된 원본 데이터로 시수/수강료 계산
    if(br.ok){
      const backup = await br.json();
      if(backup && typeof backup==='object'){
        const RATE_MAP = {
          '박선영': {type:'fix'}, '박하영': {type:'fix'},
          '박민지': {type:'remain'}, '김나현': {type:'discount50'}
        };
        const TAKUMI = ['나은솔','김건휘','김예진','최다윤','신유나','최현우','김윤재','김가람','이지아','명지민'];

        ['jul','aug'].forEach(mon=>{
          const mNum = mon==='jul'?7:8;
          if(!db[mon]) return;
          db[mon].forEach(s=>{
            const rSpec = RATE_MAP[s.name];
            // 고정/잔여 학생은 건드리지 않음
            if(rSpec && (rSpec.type==='fix' || rSpec.type==='remain')) return;
            // 취미반은 고정
            if(TAKUMI.includes(s.name)) return;

            // schedule_backup에서 해당 학생 데이터 찾기
            // 키 형식: "반_이름_월" (예: "입시반_김나연_7")
            const key = `${s.cls}_${s.name}_${mNum}`;
            const sdata = backup[key];
            if(!sdata) return;

            const regT = (sdata.lessons||[]).length;
            const spT  = (sdata.special||[]).length;
            // 전월결석은 schedule의 absIn 값 → schedule_backup에 abs 필드로 저장됨
            const absT = sdata.abs || s.absence || 0;
            const rate = s.cls==='예비반' ? 30000 : 31250;

            if(rSpec && rSpec.type==='discount50'){
              // 재수생: (정규-결석) 50% + 특강 정가
              const netReg = Math.max(0, regT - absT);
              s.amount = Math.round(netReg * rate * 0.5) + spT * rate;
              s.totalT = netReg + spT;
            } else {
              // 일반: (정규 + 특강 - 전월결석) × 단가
              const netT = Math.max(0, regT + spT - absT);
              s.amount = netT * rate;
              s.totalT = netT;
            }
            s.absence = absT;
            if(spT > 0) s.days = `정규 ${regT}T / 특강 ${spT}T${absT>0?' / 전월결석 -'+absT+'T':''} = 총 ${s.totalT}T`;
            else s.days = `${regT}T${absT>0?' (전월결석 -'+absT+'T)':''}`;
          });
        });
      }
    }

    renderAll();
    if(statusEl) statusEl.textContent='';
  } catch(e){ if(statusEl) statusEl.textContent='연결 실패'; console.error(e); }
}
function getDB(){
  const saved=loadDB();
  ['jul','aug'].forEach(m=>{
    initData[m].forEach(init=>{ if(!saved[m].find(s=>s.id===init.id)) saved[m].push(JSON.parse(JSON.stringify(init))); });
    saved[m].forEach(s=>{ if(!s.tags)s.tags=[]; if(s.remain===undefined)s.remain=null; });
  });
  return saved;
}
let db = getDB();
const fmt = n => n===0?'0원':n.toLocaleString('ko-KR')+'원';
function tagHtml(t){
  const [k,...rest]=t.split(':'); const label=rest.join(':');
  const cls=k==='fix'?'tag-fix':k==='pause'?'tag-pause':k==='re'?'tag-re':k==='dis'?'tag-dis':k==='bo'?'tag-bo':k==='new'?'tag-new':k==='special'?'tag-special':'tag-fix';
  return `<span class="tag ${cls}">${label}</span>`;
}

function renderAll(){
  if(isPC()){ pcRenderFilters(); pcRenderSidebar(); pcRenderSummary(); }
  else { mobRender(mobGetActiveMonth()); mobRenderSummary(mobGetActiveMonth()); }
}

function msgFeeNormal(s,month){
  const mon=month==='jul'?'7월':'8월';
  if(s.remain!=null) return `[수강 현황 안내 - ${s.name} 학생 (${s.cls})]\n안녕하세요. 화강암플러스미술학원입니다.\n\n■ 잔여 타임\n${s.remain}T 남음\n\n■ 문의\n${CONTACT}\n감사합니다.`;
  let body=`■ 수업 일정\n${s.schedule}`;
  if(s.days) body+=`\n\n■ 수업 일자 / 시수\n${s.days}`;
  if(s.absence>0) body+=`\n\n■ 전월 결석 차감\n-${s.absence}T (-${(s.absence*31250).toLocaleString()}원)`;
  body+=`\n\n■ ${mon} 수강료\n${s.amount.toLocaleString()}원`;
  if(s.memo) body+=`\n\n■ 참고\n${s.memo}`;
  return `[${mon} 수강료 안내 - ${s.name} 학생 (${s.cls})]\n안녕하세요. 화강암플러스미술학원입니다.\n${s.name} 학생의 ${mon} 수강료를 안내드립니다.\n\n${body}${FOOTER}`;
}
function getMessages(s,month){
  const msgs=[{label:`${month==='jul'?'7':'8'}월 수강료`,text:msgFeeNormal(s,month)}];
  return msgs;
}

function pcRenderDetail(){
  const c=document.getElementById('mainContent'); if(!c) return;
  if(!pcStudent){c.innerHTML='<div class="no-select">← 학생을 선택하세요</div>';return;}
  const s=pcStudent, msgs=getMessages(s,pcMonth);
  c.innerHTML=`<div class="detail-wrap">
    <div class="detail-left">
      <div class="dcard">
        <div class="dcard-title">${s.name} · ${s.cls}</div>
        <div style="margin-bottom:10px">${(s.tags||[]).map(tagHtml).join('')}</div>
        <div class="drow"><span class="dlbl">수업 요일</span><span class="dval">${s.schedule.replace(/\n/g,'<br>')}</span></div>
        ${s.days?`<div class="drow"><span class="dlbl">수업일자/시수</span><span class="dval">${s.days.replace(/\n/g,'<br>')}</span></div>`:''}
        ${s.absence>0?`<div class="drow"><span class="dlbl">결석 차감</span><span class="dval red">-${s.absence}T</span></div>`:''}
        ${s.totalT>0?`<div class="drow"><span class="dlbl">총 시수</span><span class="dval">${s.totalT}T</span></div>`:''}
        <div class="drow"><span class="dlbl">수강료</span><span class="dval amount">${s.remain!==null?'해당없음':fmt(s.amount)}</span></div>
        ${s.remain!==null?`<div class="drow"><span class="dlbl">잔여 타임</span><span class="dval"><span class="remain-badge">${s.remain}T</span></span></div>`:''}
        <div class="drow"><span class="dlbl">결제 여부</span><span class="dval ${s.paid?'green':'red'}">${s.paid?'결제완료':'미납'}</span></div>
        ${s.memo?`<div class="drow"><span class="dlbl">메모</span><span class="dval">${s.memo}</span></div>`:''}
        ${s.schoolInfo&&s.schoolInfo.exam?`<div class="drow"><span class="dlbl">기말고사</span><span class="dval">${s.schoolInfo.exam}</span></div>`:''}
        ${s.schoolInfo&&s.schoolInfo.vacStart?`<div class="drow"><span class="dlbl">방학일정</span><span class="dval">${s.schoolInfo.vacStart} ~ ${s.schoolInfo.vacEnd}<br>개학: ${s.schoolInfo.openDay}</span></div>`:''}
        <div class="paid-toggle">
          <button class="paid-toggle-btn ${s.paid?'paid':'unpaid'}" onclick="pcTogglePaid(event,'${s.id}')">${s.paid?'✓ 결제완료 (클릭시 취소)':'✗ 미납 (클릭시 완료처리)'}</button>
          <button class="btn btn-gray" onclick="pcToggleEdit()">편집</button>
        </div>
        <div id="editForm" style="display:none">
          <div class="edit-inline">
            <div class="ei-row"><span class="ei-label">수업 요일</span><textarea class="ei-textarea" id="ef-schedule">${s.schedule}</textarea></div>
            <div class="ei-row"><span class="ei-label">수업일자/시수</span><textarea class="ei-textarea" id="ef-days">${s.days||''}</textarea></div>
            <div class="ei-row"><span class="ei-label">결석(T)</span><input class="ei-input" type="number" id="ef-abs" value="${s.absence}"></div>
            <div class="ei-row"><span class="ei-label">총 시수(T)</span><input class="ei-input" type="number" id="ef-total" value="${s.totalT}"></div>
            <div class="ei-row"><span class="ei-label">수강료(원)</span><input class="ei-input" type="number" id="ef-amt" value="${s.amount}"></div>
            ${s.remain!==null?`<div class="ei-row"><span class="ei-label">잔여 타임</span><input class="ei-input" type="number" id="ef-remain" value="${s.remain}"></div>`:''}
            <div class="ei-row"><span class="ei-label">메모</span><textarea class="ei-textarea" id="ef-memo">${s.memo||''}</textarea></div>
            <div class="btn-row"><button class="btn btn-blue" onclick="pcSaveEdit()">저장</button><button class="btn btn-gray" onclick="pcToggleEdit()">취소</button></div>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-right">
      <div class="msg-panel">
        <div class="msg-tabs" id="msgTabs"></div>
        <div class="msg-body" id="msgBody"></div>
        <button class="msg-copy-btn" onclick="pcCopyMsg()">문자 복사</button>
      </div>
    </div>
  </div>`;
  const tabsEl=document.getElementById('msgTabs'),bodyEl=document.getElementById('msgBody');
  msgs.forEach((m,i)=>{
    const t=document.createElement('div'); t.className='msg-tab'+(i===pcMsgTab?' on':''); t.textContent=m.label;
    t.onclick=()=>{ pcMsgTab=i; document.querySelectorAll('.msg-tab').forEach((x,j)=>x.classList.toggle('on',j===i)); bodyEl.innerHTML=`<div class="msg-text">${msgs[i].text.replace(/\n/g,'<br>')}</div>`; };
    tabsEl.appendChild(t);
  });
  if(msgs.length>0) bodyEl.innerHTML=`<div class="msg-text">${msgs[pcMsgTab].text.replace(/\n/g,'<br>')}</div>`;
}
function pcToggleEdit(){ pcEditing=!pcEditing; document.getElementById('editForm').style.display=pcEditing?'block':'none'; }
function pcSaveEdit(){
  const s=db[pcMonth].find(x=>x.id===pcStudent.id); if(!s) return;
  s.schedule=document.getElementById('ef-schedule').value;
  s.days=document.getElementById('ef-days').value;
  s.absence=parseInt(document.getElementById('ef-abs').value)||0;
  s.totalT=parseInt(document.getElementById('ef-total').value)||0;
  s.amount=parseInt(document.getElementById('ef-amt').value)||0;
  s.memo=document.getElementById('ef-memo').value;
  const rem=document.getElementById('ef-remain'); if(rem){ const rv=parseInt(rem.value); s.remain=(isNaN(rv)||rv<0)?null:rv; } else s.remain=null;
  saveDB(db); pcStudent=s; pcEditing=false; pcRenderSidebar(); pcRenderSummary(); pcRenderDetail();
}
function pcCopyMsg(){
  const msgs=getMessages(pcStudent,pcMonth); if(!msgs[pcMsgTab]) return;
  navigator.clipboard.writeText(msgs[pcMsgTab].text).then(()=>{ const btn=document.querySelector('.msg-copy-btn'); btn.textContent='복사됨!'; setTimeout(()=>btn.textContent='문자 복사',2000); });
}

// ── 시작 ──
init();
</script>
</body>
</html>
