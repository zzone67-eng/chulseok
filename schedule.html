<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>화강암+ 스케줄</title>
<style>
:root{
  --bg:#111114;--sf:#1C1C20;--sf2:#252529;
  --bd:#2E2E34;--bd2:#3A3A42;
  --tx:#E2E0DA;--tx2:#8A8880;--tx3:#46464E;
  --red:#C0392B;--blue:#4A90D0;--green:#2A9A52;--yellow:#C88010;
  --bdim:#152336;--bmid:#1E3A52;--bbr:#2E5A80;
  --ydim:#231A08;--ybr:#705418;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* 탑바 */
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
@supports(padding-top:env(safe-area-inset-top)){.topbar{padding-top:calc(12px + env(safe-area-inset-top));}}
.tb-accent{width:4px;height:20px;background:var(--red);border-radius:2px;}
.tb-title{font-size:16px;font-weight:700;flex:1;}
.sync-btn{padding:7px 13px;background:var(--sf2);color:var(--tx2);border:1px solid var(--bd2);border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.sync-btn.ok{color:var(--green);border-color:var(--green);}
.sync-btn.ing{color:var(--yellow);border-color:var(--ybr);}

/* 레이아웃 */
.layout{flex:1;display:flex;overflow:hidden;}
.sidebar,.right{display:flex !important;}

/* 사이드바 */
.sidebar{width:200px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;}
.month-row{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;}
.mth-btn{flex:1;padding:10px;text-align:center;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;}
.mth-btn.on{background:var(--red);color:#fff;}
.cls-lbl{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.07em;padding:10px 12px 4px;text-transform:uppercase;}
.sb-list{flex:1;overflow-y:auto;}
.stu-btn{width:100%;text-align:left;padding:8px 12px;background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--tx2);display:flex;justify-content:space-between;align-items:center;}
.stu-btn:hover{background:var(--sf2);}
.stu-btn.on{background:var(--bdim);color:var(--blue);font-weight:700;border-right:3px solid var(--blue);}
.stu-t{font-size:11px;font-weight:700;color:var(--blue);background:var(--bdim);padding:2px 7px;border-radius:999px;}

/* 가운데 */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* 학생 헤더 */
.stu-hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:52px;}
.stu-back{width:30px;height:30px;border-radius:50%;background:var(--sf2);border:none;color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;display:none;}
.stu-hinfo{flex:1;}
.stu-hname{font-size:14px;font-weight:700;color:var(--tx);}
.stu-hcls{font-size:11px;color:var(--tx2);}
.stu-stats{display:flex;gap:14px;}
.stat{text-align:right;}
.stat-l{font-size:9px;color:var(--tx3);}
.stat-v{font-size:14px;font-weight:700;color:var(--blue);}
.stat-v.y{color:var(--yellow);}
.stat-v.s{font-size:11px;}

/* 액션 */
.act-row{display:flex;gap:8px;padding:8px 12px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;}
.act-btn{flex:1;padding:7px;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;border:none;text-align:center;}
.act-btn.red{background:#2A1210;color:#E05050;border:1px solid #5A2020;}
.act-btn.dim{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd2);}

/* 달력 */
.cal-scroll{flex:1;overflow-y:auto;}
.cal-wrap{padding:8px;}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.dow{text-align:center;font-size:10px;font-weight:700;color:var(--tx3);padding:4px 0;}
.dow.sun{color:#E05050;}.dow.sat{color:var(--blue);}
.weeks{display:flex;flex-direction:column;gap:3px;}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day{background:var(--sf);border-radius:var(--rs);border:1px solid var(--bd);overflow:hidden;}
.day.empty{background:var(--bg);border-color:transparent;}
.day-hd{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;background:var(--sf2);border-bottom:1px solid var(--bd);}
.day-n{font-size:12px;font-weight:700;color:var(--tx2);}
.day-n.sun{color:#E05050;}.day-n.sat{color:var(--blue);}
.day-t{font-size:10px;font-weight:700;color:var(--blue);}
.day-slots{display:flex;flex-direction:column;gap:2px;padding:3px;}
.slot{border-radius:4px;border:1px solid transparent;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--tx3);background:var(--sf);cursor:pointer;padding:4px 0;user-select:none;}
.slot:active{opacity:.6;}
.slot.on{background:var(--bmid);border-color:var(--bbr);color:var(--blue);}
.slot.sp{background:var(--ydim);border-color:var(--ybr);color:var(--yellow);}
.slot.off{opacity:.3;text-decoration:line-through;}

/* 범례 */
.legend{display:flex;gap:10px;padding:7px 12px;background:var(--sf);border-top:1px solid var(--bd);font-size:10px;color:var(--tx2);flex-shrink:0;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;}
.leg-box{width:10px;height:10px;border-radius:3px;}

/* 우측 패널 */
.right{width:280px;background:var(--sf);border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.rp-sec{display:flex;flex-direction:column;border-bottom:1px solid var(--bd);overflow:hidden;}
.rp-sec.grow2{flex:2;}
.rp-sec.grow1{flex:1;}
.rp-sec.fixed{flex-shrink:0;}
.rp-hdr{font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:.05em;padding:9px 14px;background:var(--sf2);border-bottom:1px solid var(--bd);flex-shrink:0;}
.rp-body{padding:12px 14px;}
.rp-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;}
.rp-row .lbl{color:var(--tx2);}
.rp-row .val{font-weight:600;color:var(--tx);}
.rp-row .val.blue{color:var(--blue);}
.rp-row .val.red{color:#E05050;}
.rp-row .val.y{color:var(--yellow);}
.rp-divider{border:none;border-top:1px solid var(--bd);margin:6px 0;}
.rp-fee{display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding:4px 0;}
.rp-fee .lbl{color:var(--tx2);}
.rp-fee .val{color:var(--blue);}
.abs-row{display:flex;align-items:center;gap:8px;padding:10px 14px;}
.abs-lbl{font-size:12px;color:var(--tx2);white-space:nowrap;}
.abs-input{width:52px;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--tx);font-size:14px;font-weight:700;padding:5px 8px;text-align:center;outline:none;-moz-appearance:textfield;}
.abs-input::-webkit-outer-spin-button,.abs-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.abs-input:focus{border-color:var(--blue);}
.rp-ta{flex:1;width:100%;background:transparent;border:none;color:var(--tx);font-size:12px;font-family:inherit;line-height:1.75;padding:10px 14px;resize:none;outline:none;}
.rp-ta::placeholder{color:var(--tx3);}
.copy-btn{margin:0 14px 10px;padding:8px;background:var(--bmid);border:1px solid var(--bbr);color:var(--blue);border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;text-align:center;flex-shrink:0;}

/* 모바일 전용 */















.note-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);}
.note-hdr{font-size:11px;font-weight:700;color:var(--tx2);padding:9px 14px;background:var(--sf2);border-bottom:1px solid var(--bd);border-radius:var(--r) var(--r) 0 0;}
.note-ta{width:100%;min-height:120px;background:transparent;border:none;color:var(--tx);font-size:13px;font-family:inherit;line-height:1.75;padding:10px 14px;resize:none;outline:none;}
.note-ta::placeholder{color:var(--tx3);}

/* 반응형 */
.add-stu-btn{width:100%;padding:6px;margin-top:4px;background:transparent;border:1px dashed var(--bd2);color:var(--tx3);font-size:11px;border-radius:var(--rs);cursor:pointer;}
.add-stu-btn:hover{background:var(--sf2);color:var(--tx);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.on{display:flex;}
.modal-box{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:24px;width:340px;max-width:90vw;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;}
.modal-field{margin-bottom:12px;}
.modal-label{font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:600;}
.modal-input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--tx);font-size:13px;font-family:inherit;outline:none;}
.modal-input:focus{border-color:var(--blue);}
.day-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.day-chip{padding:5px 10px;border-radius:999px;border:1px solid var(--bd2);background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;}
.day-chip.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-btn{flex:1;padding:9px;border-radius:var(--rs);border:none;font-size:13px;font-weight:600;cursor:pointer;}
.modal-btn.ok{background:var(--blue);color:#fff;}
.modal-btn.cancel{background:var(--sf2);color:var(--tx2);}
.del-stu-btn{margin-left:4px;color:var(--red);opacity:0.5;font-size:11px;cursor:pointer;background:none;border:none;padding:0 2px;}
.del-stu-btn:hover{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-accent"></div>
  <div class="tb-title">화강암+ 스케줄</div>
  <button class="sync-btn" id="syncBtn" onclick="syncFB()">Firebase 동기화</button>
  <button class="sync-btn" onclick="resetLocal()" style="background:#3a1a1a;color:#ff6b6b;border-color:#ff6b6b;font-size:11px">로컬 초기화</button>
</div>

<div class="layout">

  <!-- PC 사이드바 -->
  <div class="sidebar">
    <div class="month-row" id="monthRow"></div>
    <div class="sb-list" id="sbList"></div>
  </div>

  <!-- 가운데 -->
  <div class="center">

    <!-- 달력 뷰 -->
    <div class="stu-hdr" id="stuHdr">
      <div class="stu-hinfo">
        <div class="stu-hname" id="hName">학생을 선택하세요</div>
        <div class="stu-hcls" id="hCls"></div>
      </div>
      <div class="stu-stats" id="stuStats" style="display:none;">
        <div class="stat"><div class="stat-l">정규</div><div class="stat-v" id="sR">-</div></div>
        <div class="stat"><div class="stat-l">특강</div><div class="stat-v y" id="sS">-</div></div>
        <div class="stat"><div class="stat-l">수강료</div><div class="stat-v s" id="sAmt">-</div></div>
      </div>
    </div>
    <div class="act-row" id="actRow" style="display:none;">
      <button class="act-btn red" onclick="allOff()">이번달 전체 휴강</button>
      <button class="act-btn dim" onclick="resetMon()">초기화</button>
    </div>
    <div class="cal-scroll" id="calScroll">
      <div class="cal-wrap">
        <div class="dow-row">
          <div class="dow sun">일</div><div class="dow">월</div><div class="dow">화</div>
          <div class="dow">수</div><div class="dow">목</div><div class="dow">금</div>
          <div class="dow sat">토</div>
        </div>
        <div class="weeks" id="weeks"></div>
      </div>
    </div>
    <div class="legend">
      <span class="leg"><span class="leg-box" style="background:var(--bmid);border:1px solid var(--bbr);"></span>정규</span>
      <span class="leg"><span class="leg-box" style="background:var(--ydim);border:1px solid var(--ybr);"></span>특강</span>
      <span class="leg"><span class="leg-box" style="background:var(--sf);border:1px solid var(--bd);opacity:.3;"></span>제외</span>
      <span style="margin-left:auto;color:var(--tx3);font-size:10px;">클릭: 토글 | Shift+클릭 / 우클릭: 정규↔특강</span>
    </div>

  </div>

  <!-- PC 우측 패널 -->
  <div class="right">
    <!-- 전월결석 + 수강료 -->
    <div class="rp-sec fixed">
      <div class="rp-hdr">전월 결석 / 수강료</div>
      <div class="abs-row">
        <span class="abs-lbl">전월 결석</span>
        <input class="abs-input" type="text" inputmode="numeric" id="absIn" value="0" oninput="onAbs()">
        <span class="abs-lbl">T</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0 14px 12px;">
        <span style="font-size:12px;color:var(--tx2);">4주 기준으로 계산</span>
        <label style="position:relative;display:inline-block;width:36px;height:20px;cursor:pointer;">
          <input type="checkbox" id="use4wk" onchange="onAbs()" style="opacity:0;width:0;height:0;position:absolute;">
          <span id="toggleTrack" style="position:absolute;inset:0;background:var(--bd2);border-radius:999px;transition:background .2s;"></span>
          <span id="toggleThumb" style="position:absolute;left:3px;top:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;"></span>
        </label>
      </div>
      <div class="rp-body" style="padding-top:0;">
        <div class="rp-row"><span class="lbl">정규</span><span class="val" id="rpR">-</span></div>
        <div class="rp-row"><span class="lbl">특강</span><span class="val y" id="rpS">-</span></div>
        <div class="rp-row"><span class="lbl">결석 차감</span><span class="val red" id="rpA">-</span></div>
        <hr class="rp-divider">
        <div class="rp-fee"><span class="lbl">수강료</span><span class="val" id="rpFee">-</span></div>
      </div>
    </div>
    <!-- 수강료 문자 -->
    <div class="rp-sec grow2" style="display:flex;flex-direction:column;">
      <div class="rp-hdr">수강료 안내 문자</div>
      <textarea class="rp-ta" id="feeMsg" placeholder="학생을 선택하면 자동 생성됩니다..."></textarea>
      <button class="copy-btn" id="feeCopyBtn" style="display:none;" onclick="copyMsg('feeMsg','feeCopyBtn')">문자 복사</button>
    </div>
    <!-- 메모 -->
    <div class="rp-sec grow1" style="display:flex;flex-direction:column;">
      <div class="rp-hdr">메모</div>
      <textarea class="rp-ta" id="memoMsg" placeholder="수업 메모, 특이사항..."></textarea>
    </div>
  </div>

</div>

<!-- 학생 추가 모달 -->
<div class="modal-overlay" id="addStudentModal" onclick="closeAddStudent()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title" id="addModalTitle">학생 추가</div>
    <div class="modal-field">
      <div class="modal-label">이름</div>
      <input class="modal-input" id="newStudentName" placeholder="학생 이름">
    </div>
    <div class="modal-field">
      <div class="modal-label">수업 요일 (중복 선택 가능)</div>
      <div class="day-grid" id="dayGrid">
        <button type="button" class="day-chip" data-day="일" onclick="toggleDayChip(this)">일</button>
        <button type="button" class="day-chip" data-day="월" onclick="toggleDayChip(this)">월</button>
        <button type="button" class="day-chip" data-day="화" onclick="toggleDayChip(this)">화</button>
        <button type="button" class="day-chip" data-day="수" onclick="toggleDayChip(this)">수</button>
        <button type="button" class="day-chip" data-day="목" onclick="toggleDayChip(this)">목</button>
        <button type="button" class="day-chip" data-day="금" onclick="toggleDayChip(this)">금</button>
        <button type="button" class="day-chip" data-day="토" onclick="toggleDayChip(this)">토</button>
      </div>
    </div>
    <div class="modal-btns">
      <button type="button" class="modal-btn cancel" onclick="closeAddStudent()">취소</button>
      <button type="button" class="modal-btn ok" onclick="confirmAddStudent()">추가</button>
    </div>
  </div>
</div>

<script>
const DB='https://hwa1-c1ad9-default-rtdb.firebaseio.com';
const YEAR=new Date().getFullYear();
const BANK='부산은행 101-2092-8547-06 (예금주: 화강암플러스미술학원)';

const STUDENTS={

  '취미반':[{name:'나은솔',days:['토']},{name:'김건휘',days:['일']},{name:'김예진',days:['목','토']},{name:'최다윤',days:['일']},{name:'신유나',days:['토']},{name:'최현우',days:['토']},{name:'김윤재',days:['토','일']},{name:'김가람',days:['토','일']},{name:'이지아',days:['토']},{name:'명지민',days:['토']}]
};

const DAYS_DESC={

let _addingCls='',_selectedDays=[];

function openAddStudent(cls){
  _addingCls=cls;_selectedDays=[];
  document.getElementById('newStudentName').value='';
  document.getElementById('addModalTitle').textContent=cls+' 학생 추가';
  document.querySelectorAll('.day-chip').forEach(c=>c.classList.remove('on'));
  document.getElementById('addStudentModal').classList.add('on');
}
function closeAddStudent(){document.getElementById('addStudentModal').classList.remove('on');}
function confirmAddStudent(){
  const name=document.getElementById('newStudentName').value.trim();
  if(!name){alert('이름을 입력하세요.');return;}
  if(_selectedDays.length===0){alert('수업 요일을 선택하세요.');return;}
  if(STUDENTS[_addingCls].find(s=>s.name===name)){alert('이미 같은 이름의 학생이 있습니다.');return;}
  STUDENTS[_addingCls].push({name,days:[..._selectedDays]});
  saveStudents();closeAddStudent();renderSB();
  alert(name+' 학생이 추가됐습니다.');
}
function toggleDayChip(chip){
  const day=chip.dataset.day;
  if(_selectedDays.includes(day)){_selectedDays=_selectedDays.filter(d=>d!==day);chip.classList.remove('on');}
  else{_selectedDays.push(day);chip.classList.add('on');}
}
function removeStudent(cls,name){
  if(!confirm(name+' 학생을 제거할까요?\n수업 데이터도 모두 삭제됩니다.'))return;
  STUDENTS[cls]=STUDENTS[cls].filter(s=>s.name!==name);
  Object.keys(db).forEach(k=>{if(k.includes('_'+name+'_'))delete db[k];});
  save();saveStudents();
  if(curStu===name){curStu=null;curCls=null;}
  renderSB();renderCal();
}
function saveStudents(){
  const stuData={};
  Object.entries(STUDENTS).forEach(([cls,stus])=>{stuData[cls]=stus.map(s=>({name:s.name,days:s.days}));});
  fetch(DB+'/students_list.json',{method:'PUT',body:JSON.stringify(stuData),headers:{'Content-Type':'application/json'}}).catch(()=>{});
}
async function loadStudents(){
  try{
    const r=await fetch(DB+'/students_list.json?_='+Date.now());
    if(!r.ok)return;
    const data=await r.json();
    if(!data||typeof data!=='object')return;
    Object.entries(data).forEach(([cls,stus])=>{
      if(Array.isArray(stus)){
        if(!STUDENTS[cls])STUDENTS[cls]=[];
        const fbStus=stus.filter(s=>s.name&&Array.isArray(s.days)&&s.days.length>0);
        if(fbStus.length===0)return; // Firebase 데이터 없으면 기존 유지
        // 기존 학생 유지하면서 Firebase 신규 학생 추가
        fbStus.forEach(fs=>{
          if(!STUDENTS[cls].find(s=>s.name===fs.name)){
            STUDENTS[cls].push({name:fs.name,days:fs.days});
          }
        });
        // Firebase에서 삭제된 학생 제거
        STUDENTS[cls]=STUDENTS[cls].filter(s=>fbStus.find(fs=>fs.name===s.name));
      }
    });
    console.log('학생 목록 로드 완료');
  }catch(e){console.log('학생 목록 로드 실패');}
}

function resetLocal(){
  if(!confirm('로컬 데이터를 초기화합니다. 체크한 내용이 모두 사라집니다. 계속할까요?')) return;
  localStorage.removeItem('sch_v1');
  localStorage.removeItem('sch_v1_ts');
  db={};
  renderSB();alert('초기화 완료. 이제 정상적으로 사용하실 수 있습니다.');
}
function getData(cls,name,month){
  const k=sk(cls,name,month);
  if(!db[k]||typeof db[k]!=='object'||!Array.isArray(db[k].lessons)){
    const s=STUDENTS[cls]?.find(x=>x.name===name);
    if(!s||!Array.isArray(s.days)){db[k]={lessons:[],special:[],excluded:[]};return db[k];}
    const tot=getDays(month),fst=getFirst(month),ls=[];
    for(let d=1;d<=tot;d++){
      const dw=(fst+d-1)%7,cnt=s.days.filter(x=>x===DAY[dw]).length;
      for(let t=1;t<=cnt;t++) ls.push({day:d,tim:t,type:'regular'});
    }
    db[k]={lessons:ls,special:[],excluded:[]};save();
  }
  return db[k];
}

function renderSB(){
  const el=document.getElementById('sbList');
  if(!el) return;
  el.innerHTML='';
  Object.entries(STUDENTS).forEach(([cls,stus])=>{
    const lbl=document.createElement('div');lbl.className='cls-lbl';lbl.textContent=cls;el.appendChild(lbl);
    stus.forEach(s=>{
      try{
      const d=getData(cls,s.name,mon),t=d.lessons.length+d.special.length;
      const btn=document.createElement('button');
      btn.className='stu-btn'+(curCls===cls&&curStu===s.name?' on':'');
      btn.innerHTML='<span>'+s.name+'</span><span style="display:flex;align-items:center;gap:4px"><span class="stu-t">'+t+'T</span><button class="del-stu-btn" onclick="event.stopPropagation();removeStudent(\''+cls+'\',\''+s.name+'\')">✕</button></span>';
      btn.onclick=()=>pick(cls,s.name);
      el.appendChild(btn);
      }catch(e){console.error('renderSB 오류:',cls,s.name,e);}
    });
    // 반별 학생 추가 버튼
    const addBtn=document.createElement('button');
    addBtn.type='button';addBtn.className='add-stu-btn';
    addBtn.textContent='+ 학생 추가';
    addBtn.onclick=()=>openAddStudent(cls);
    el.appendChild(addBtn);
  });
}

// ── 통계 ──
function getAbs(){return parseInt(document.getElementById('absIn')?.value||0)||0;}

function calcFee(){
  if(!curStu) return null;
  const d=getData(curCls,curStu,mon);
  const rate=curCls==='예비반'?30000:31250;
  const s=STUDENTS[curCls].find(x=>x.name===curStu);
  const abs=getAbs(),sp=d.special.length;
  const actualReg=d.lessons.length; // 실제 체크 시수
  const use4wk=document.getElementById('use4wk')?.checked;
  let reg=use4wk ? s.days.length*4 : actualReg; // 수강료 계산용
  let finalT=Math.max(0,reg+sp-abs);
  let fee=finalT*rate;
  if(curStu==='김나현'){
    const rT=use4wk?s.days.length*4:actualReg;
    fee=Math.round(rT*rate*0.5)+sp*rate;
  }
  if(curCls==='취미반'){
    const base=s.days.length===1?100000:200000;
    fee=Math.max(0,base-abs*25000)+sp*25000;
    reg=use4wk?s.days.length*4:actualReg;finalT=reg;
  }
  return {rate,reg,sp,abs,finalT,fee,actualReg};
}

function updateStats(){
  const c=calcFee();if(!c) return;
  // 상단: 실제 체크 시수
  document.getElementById('sR').textContent=c.actualReg+'T';
  document.getElementById('sS').textContent=c.sp+'T';
  document.getElementById('sAmt').textContent=fmt(c.fee);
  // 우측 패널: 수강료 계산 기준
  const use4wk=document.getElementById('use4wk')?.checked;
  document.getElementById('rpR').textContent=c.reg+'T'+(use4wk?' (4주)':'');
  document.getElementById('rpS').textContent=c.sp+'T';
  document.getElementById('rpA').textContent=c.abs>0?'-'+c.abs+'T':'없음';
  document.getElementById('rpFee').textContent=fmt(c.fee);
}

function onAbs(){
  if(!curStu) return;
  const absVal=getAbs();
  localStorage.setItem('abs_'+curCls+'_'+curStu+'_'+mon,absVal);
  const cb=document.getElementById('use4wk');
  if(cb) localStorage.setItem('4wk_'+curCls+'_'+curStu+'_'+mon,cb.checked?'1':'0');
  // db에도 abs 저장 → Firebase 자동동기화
  const k=curCls+'_'+curStu+'_'+mon;
  if(db[k]) db[k].abs=absVal;
  save();
  updateToggle();
  updateStats();updateFee();
}

function updateToggle(){
  const cb=document.getElementById('use4wk');
  const track=document.getElementById('toggleTrack');
  const thumb=document.getElementById('toggleThumb');
  if(!cb||!track||!thumb) return;
  track.style.background=cb.checked?'var(--blue)':'var(--bd2)';
  thumb.style.transform=cb.checked?'translateX(16px)':'translateX(0)';
}

// ── 문자 생성 ──
function genMsg(c){
  const m=mon+'월',dd=DAYS_DESC[curStu]||'',hasA=c.abs>0,hasSp=c.sp>0;
  const spN=curCls==='중등반'&&hasSp?'★ 방학특강 요일 확정 요청 ★\n현재 특강은 최대 타임 기준으로 안내드리고 있습니다.\n정확한 요일 및 타임 확정 후 수강료가 변동될 수 있으니,\n요일이 확정되는 대로 꼭 학원으로 연락 주시기 바랍니다.\n\n':'';
  let body='';
  if(curStu==='박선영'||curStu==='박하영'){
    body='■ 수업 일정\n'+dd+'\n\n■ '+m+' 수강료\n'+fmt(c.fee)+' (고정)';
  } else if(curStu==='박민지'){
    body='■ 잔여 타임 안내\n잔여 타임 소진 후 별도 안내 예정입니다.\n\n최근 출결이 나아지고 있습니다. 꾸준한 출석 부탁드립니다.';
  } else if(curCls==='취미반'){
    const s=STUDENTS[curCls].find(x=>x.name===curStu);
    const base=s.days.length===1?100000:200000;
    body='■ 수업 일정\n'+dd+'\n\n■ '+m+' 수강료'+(hasA?'\n기본: '+fmt(base)+'\n전월 결석 차감: -'+c.abs+'회 (-'+fmt(c.abs*25000)+')\n합계: ':'\n')+fmt(c.fee);
  } else if(curStu==='김나현'){
    const s=STUDENTS[curCls].find(x=>x.name===curStu);
    const rT=c.abs===0?s.days.length*4:getData(curCls,curStu,mon).lessons.length;
    const rFull=rT*c.rate,rDisc=Math.round(rFull*0.5),spFee=c.sp*c.rate;
    body='■ 수업 일정\n'+dd+'\n\n■ '+m+' 수업 내역\n정규 수업: '+rT+'T'+(hasSp?'\n방학 특강: '+c.sp+'T':'')+(hasA?'\n전월 결석 차감: -'+c.abs+'T':'')+'\n합계: 총 '+c.finalT+'T\n\n■ '+m+' 수강료\n· 정규: '+c.rate.toLocaleString()+'원 × '+rT+'T = '+rFull.toLocaleString()+'원\n  재수생 50% 할인 → '+rDisc.toLocaleString()+'원'+(hasSp?'\n· 특강: '+c.rate.toLocaleString()+'원 × '+c.sp+'T = '+spFee.toLocaleString()+'원 (할인 없음)':'')+'\n· 합계: '+fmt(c.fee);
  } else {
    body='■ 수업 일정\n'+dd+'\n\n■ '+m+' 수업 내역\n정규 수업: '+c.reg+'T'+(hasSp?'\n방학 특강: '+c.sp+'T':'')+(hasA?'\n전월 결석 차감: -'+c.abs+'T':'')+'\n합계: 총 '+c.finalT+'T\n\n■ '+m+' 수강료\n'+c.rate.toLocaleString()+'원 × '+c.finalT+'T = '+fmt(c.fee);
  }
  return '['+m+' 수강료 안내 - '+curStu+' 학생 ('+curCls+')]\n안녕하세요. 화강암플러스미술학원입니다.\n\n'+spN+body+FOOT;
}

function updateFee(){
  const c=calcFee();if(!c) return;
  const ta=document.getElementById('feeMsg');
  const btn=document.getElementById('feeCopyBtn');
  if(ta) ta.value=genMsg(c);
  if(btn) btn.style.display='block';
}

function copyMsg(taId,btnId){
  const ta=document.getElementById(taId);
  if(!ta) return;
  navigator.clipboard.writeText(ta.value).then(()=>{
    const b=document.getElementById(btnId);
    if(b){b.textContent='복사됨!';setTimeout(()=>b.textContent='문자 복사',2000);}
  });
}

// ── 달력 ──
function renderCal(){
  const cont=document.getElementById('weeks');
  cont.innerHTML='';
  if(!curStu) return;
  const d=getData(curCls,curStu,mon);
  const s=STUDENTS[curCls].find(x=>x.name===curStu);
  const tot=getDays(mon),fst=getFirst(mon);
  const cells=[];
  for(let i=0;i<fst;i++) cells.push(null);
  for(let day=1;day<=tot;day++) cells.push(day);
  while(cells.length%7) cells.push(null);
  for(let w=0;w<cells.length/7;w++){
    const row=document.createElement('div');row.className='week';
    for(let i=0;i<7;i++){
      const day=cells[w*7+i],card=document.createElement('div');
      if(!day){card.className='day empty';row.appendChild(card);continue;}
      card.className='day';
      const dw=i,dn=DAY[dw],def=s.days.filter(x=>x===dn).length;
      const excl=d.excluded.includes(day);
      const rl=d.lessons.filter(l=>l.day===day),sp=d.special.filter(l=>l.day===day);
      const tot2=rl.length+sp.length;
      const hd=document.createElement('div');hd.className='day-hd';
      hd.innerHTML='<span class="day-n'+(dw===0?' sun':dw===6?' sat':'')+'">'+day+'</span>'+(tot2>0?'<span class="day-t">'+tot2+'T</span>':'');
      card.appendChild(hd);
      const sl=document.createElement('div');sl.className='day-slots';
      for(let t=1;t<=3;t++){
        const slot=document.createElement('div');
        const hR=rl.some(l=>l.tim===t),hS=sp.some(l=>l.tim===t),isDef=t<=def;
        slot.className='slot'+(hR?' on':hS?' sp':excl&&isDef?' off':'');
        slot.textContent=t+'T';
        slot.dataset.d=day;slot.dataset.t=t;slot.dataset.dn=dn;slot.dataset.def=def;
        sl.appendChild(slot);
      }
      card.appendChild(sl);row.appendChild(card);
    }
    cont.appendChild(row);
  }
  cont.onclick=e=>{
    const sl=e.target.closest('.slot');if(!sl)return;
    if(lock)return;lock=true;setTimeout(()=>lock=false,250);
    if(e.shiftKey) toggleSp(+sl.dataset.d,+sl.dataset.t);
    else toggleSlot(+sl.dataset.d,+sl.dataset.t,sl.dataset.dn,+sl.dataset.def);
  };
  cont.oncontextmenu=e=>{
    e.preventDefault();const sl=e.target.closest('.slot');
    if(sl)toggleSp(+sl.dataset.d,+sl.dataset.t);
  };
  cont.addEventListener('touchstart',e=>{
    const sl=e.target.closest('.slot');if(!sl)return;
    ptimer=setTimeout(()=>toggleSp(+sl.dataset.d,+sl.dataset.t),600);
  },{passive:true});
  cont.addEventListener('touchend',()=>clearTimeout(ptimer),{passive:true});
  cont.addEventListener('touchmove',()=>clearTimeout(ptimer),{passive:true});
}

function toggleSlot(day,tim,dn,def){
  const d=getData(curCls,curStu,mon);
  const hR=d.lessons.some(l=>l.day===day&&l.tim===tim);
  const hS=d.special.some(l=>l.day===day&&l.tim===tim);
  const isDef=tim<=def;
  if(hR){d.lessons=d.lessons.filter(l=>!(l.day===day&&l.tim===tim));if(isDef&&!d.excluded.includes(day))d.excluded.push(day);}
  else if(hS){d.special=d.special.filter(l=>!(l.day===day&&l.tim===tim));}
  else{d.excluded=d.excluded.filter(x=>x!==day);d.lessons.push({day,tim,type:'regular'});}
  save();renderCal();updateStats();updateFee();renderSB();}

function toggleSp(day,tim){
  const d=getData(curCls,curStu,mon);
  const hR=d.lessons.some(l=>l.day===day&&l.tim===tim);
  const hS=d.special.some(l=>l.day===day&&l.tim===tim);
  if(hR){d.lessons=d.lessons.filter(l=>!(l.day===day&&l.tim===tim));d.special.push({day,tim,type:'special'});}
  else if(hS){d.special=d.special.filter(l=>!(l.day===day&&l.tim===tim));d.lessons.push({day,tim,type:'regular'});}
  save();renderCal();updateStats();updateFee();
}

function allOff(){
  if(!curStu||!confirm(curStu+' '+mon+'월 전체 휴강?'))return;
  const d=getData(curCls,curStu,mon),s=STUDENTS[curCls].find(x=>x.name===curStu);
  const tot=getDays(mon),fst=getFirst(mon);
  d.lessons=[];d.special=[];d.excluded=[];
  for(let day=1;day<=tot;day++){const dw=(fst+day-1)%7;if(s.days.includes(DAY[dw]))d.excluded.push(day);}
  save();renderCal();updateStats();updateFee();renderSB();}

function resetMon(){
  if(!curStu||!confirm(curStu+' '+mon+'월 초기화?'))return;
  delete db[sk(curCls,curStu,mon)];
  save();renderCal();updateStats();updateFee();renderSB();}

// ── 메모 ──
function nk(f){return 'note_'+curCls+'_'+curStu+'_'+mon+'_'+f;}
function saveNote(){
  if(!curStu)return;
  const fee=document.getElementById('feeMsg'),memo=document.getElementById('memoMsg');
  if(fee) localStorage.setItem(nk('fee'),fee.value);
  if(memo) localStorage.setItem(nk('memo'),memo.value);
}
function loadNote(){
  if(!curStu)return;
  const fee=document.getElementById('feeMsg'),memo=document.getElementById('memoMsg');
  if(memo){memo.value=localStorage.getItem(nk('memo'))||'';memo.oninput=saveNote;}
}

// ── Firebase ──
async function syncFB(){
  const btn=document.getElementById('syncBtn');
  btn.textContent='동기화 중...';btn.className='sync-btn ing';
  try{
    const curYear=new Date().getFullYear();const months=[new Date().getMonth()+1];const nm=new Date().getMonth()+2;if(nm<=12)months.push(nm);else months.push(1);
    for(const month of months){
      Object.entries(STUDENTS).forEach(([cls,stus])=>{
        stus.forEach(s=>getData(cls,s.name,month));
      });

      const sch={};
      const tot=getDays(month),fst=getFirst(month);
      for(let day=1;day<=tot;day++){
        const ds=YEAR+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');
        sch[ds]={'1타임':{'입시반':[],'예비반':[],'중등반':[],'취미반':[]},'2타임':{'입시반':[],'예비반':[],'중등반':[],'취미반':[]},'3타임':{'입시반':[],'예비반':[],'중등반':[],'취미반':[]}};
        Object.entries(STUDENTS).forEach(([cls,stus])=>{
          stus.forEach(s=>{
            const d=getData(cls,s.name,month);
            // excluded는 UI 표시용 — 실제 lessons/special에 있는 것만 Firebase에 저장
            [...d.lessons,...d.special].filter(l=>l.day===day).forEach(l=>{
              const tk=l.tim+'타임';
              if(!sch[ds][tk][cls].includes(s.name))sch[ds][tk][cls].push(s.name);
            });
          });
        });
      }

      // ── 디버그: 7월 4일 데이터 확인 ──
      console.log('[syncFB] 동기화 완료 - 월:', month);
      
      // ── 디버그: 주요 학생 localStorage 원본 확인 ──
      ['입시반_박민지_7','입시반_김나연_7','중등반_한지유_7','취미반_나은솔_7'].forEach(k => {
        const raw = localStorage.getItem('sch_v1');
        const parsed = raw ? JSON.parse(raw) : {};
        if(parsed[k]) console.log(`[localStorage] ${k}:`, JSON.stringify(parsed[k]));
        else console.log(`[localStorage] ${k}: 없음 (미초기화)`);
      });
      
      const totalNames = Object.values(sch).reduce((sum, day) =>
        sum + Object.values(day).reduce((s2, tim) =>
          s2 + Object.values(tim).reduce((s3, arr) => s3 + arr.length, 0), 0), 0);
      console.log('[syncFB] 전체 수업 수:', totalNames, '명/일');

      const monthKey='timetable/'+YEAR+'-'+String(month).padStart(2,'0');
      const url=DB+'/'+monthKey+'.json';
      console.log('[syncFB] PUT URL:', url);
      const res=await fetch(url,{method:'PUT',body:JSON.stringify(sch),headers:{'Content-Type':'application/json'}});
      const resText=await res.text();
      console.log('[syncFB] PUT 응답 status:', res.status, '| body:', resText.slice(0,200));
    }
    // schedule_backup 저장 (students.html 수강료 연동용) - abs 포함
    const nowTs=Date.now();
    localStorage.setItem('sch_v1_ts',String(nowTs));
    const dbWithAbs2={};
    Object.entries(db).forEach(([k,v])=>{
      const parts=k.split('_');
      if(parts.length>=3){
        const m2=parts[parts.length-1];
        const n2=parts[parts.length-2];
        const c2=parts.slice(0,parts.length-2).join('_');
        const av=parseInt(localStorage.getItem('abs_'+c2+'_'+n2+'_'+m2)||'0')||0;
        dbWithAbs2[k]={...v,abs:av};
      } else { dbWithAbs2[k]=v; }
    });
    const dbForFB2=Object.assign({},dbWithAbs2,{_updatedAt:nowTs});
    await fetch(DB+'/schedule_backup.json',{method:'PUT',body:JSON.stringify(dbForFB2),headers:{'Content-Type':'application/json'}});
    btn.textContent='✓ 동기화됨';btn.className='sync-btn ok';
    setTimeout(()=>{btn.textContent='Firebase 동기화';btn.className='sync-btn';},3000);
  }catch(e){btn.textContent='실패';btn.className='sync-btn';console.error('[syncFB] 에러:', e);}
}

// ── 초기화 ──
buildMonthButtons();
(async()=>{
  // 1. 학생 목록 로드 (Firebase students_list.json)
  await loadStudents();

  // 2. 수업 데이터 로드 (Firebase schedule_backup.json)
  try{
    const r=await fetch(DB+'/schedule_backup.json?_='+Date.now());
    if(r.ok){
      const backup=await r.json();
      if(backup&&typeof backup==='object'){
        const {_updatedAt:fbTs=0,...backupClean}=backup;
        const validKeys=Object.keys(backupClean).filter(k=>{
          const v=backupClean[k];
          return v&&typeof v==='object'&&Array.isArray(v.lessons)&&Array.isArray(v.special);
        });
        if(validKeys.length>0){
          const localTs=parseInt(localStorage.getItem('sch_v1_ts')||'0');
          if(fbTs>=localTs||Object.keys(db).length===0){
            db=backupClean;
            localStorage.setItem('sch_v1',JSON.stringify(db));
            localStorage.setItem('sch_v1_ts',String(fbTs||Date.now()));
          }
        }
      }
    }
  }catch(e){console.log('schedule_backup 로드 실패:',e.message);}

  // 3. 렌더
  renderSB();
})();
