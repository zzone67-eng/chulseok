<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화강암플러스 수강생 관리</title>
<style>
:root {
  --bg:#F4F3F0; --surface:#fff; --border:#E4E2DC;
  --text:#1A1917; --text2:#6B6860; --text3:#A0A09A;
  --red:#C0392B; --blue:#2C5F8A; --green:#1A7A45;
  --yellow:#D4890A; --purple:#5B3FA0;
  --sidebar:280px; --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* 상단 헤더 */
.topbar{background:var(--red);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;}
.topbar-right{display:flex;align-items:center;gap:16px;position:relative;}
.s-row{display:flex;align-items:center;gap:12px;}
.s-toggle-btn{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1;position:relative;z-index:2;}
.s-toggle-btn:hover{color:#fff;}
.s-cls-panel{display:flex;align-items:center;gap:0;overflow:hidden;max-width:0;opacity:0;transition:max-width .35s ease,opacity .25s ease;position:absolute;right:28px;top:50%;transform:translateY(-50%);background:var(--red);z-index:1;white-space:nowrap;flex-direction:row-reverse;}
.s-cls-panel.open{max-width:500px;opacity:1;}
.s-cls-item{display:flex;flex-direction:column;align-items:flex-end;padding:0 10px;border-right:1px solid rgba(255,255,255,.15);flex-shrink:0;}
.s-cls-item:last-child{border-right:none;padding-right:0;}
.s-cls-name{font-size:10px;color:rgba(255,255,255,.55);margin-bottom:1px;}
.s-cls-amt{font-size:12px;font-weight:700;color:#fff;}
.s-vdiv{width:1px;height:28px;background:rgba(255,255,255,.2);flex-shrink:0;}
.s-main-item{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.s-lbl{font-size:10px;color:rgba(255,255,255,.55);margin-bottom:1px;}
.s-val{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;}
.s-val.remain{color:#FFB3AE;}
.unpaid-btn{background:rgba(0,0,0,.2);color:#fff;border:1px solid rgba(255,255,255,.15);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.unpaid-btn:hover{background:rgba(0,0,0,.3);}

/* 메인 레이아웃 */
.main{display:flex;flex:1;overflow:hidden;}

/* 사이드바 */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-month{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);}
.sm-btn{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);border:1px solid var(--border);background:transparent;cursor:pointer;border-radius:8px;transition:all .15s;}
.sm-btn.on{background:var(--red);color:#fff;border-color:var(--red);font-weight:700;}
.sidebar-search{padding:12px 12px 8px;}
.search-input{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;background:var(--bg);outline:none;}
.search-input:focus{border-color:var(--blue);}
.class-filters{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 8px;}
.cf-btn{padding:3px 10px;border-radius:999px;border:1px solid var(--border);background:transparent;font-size:11px;color:var(--text2);cursor:pointer;}
.cf-btn.on{background:var(--text);color:#fff;border-color:var(--text);}
.student-list{flex:1;overflow-y:auto;padding:4px 8px 12px;}
.student-list::-webkit-scrollbar{width:4px;}
.student-list::-webkit-scrollbar-track{background:transparent;}
.student-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sec-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;padding:10px 4px 4px;text-transform:uppercase;}
.s-item{display:flex;align-items:center;gap:8px;padding:8px 8px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;transition:background .1s;}
.s-item:hover{background:var(--bg);}
.s-item.active{background:#EEF4FB;}
.s-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;}
.s-check.done{background:var(--green);border-color:var(--green);color:#fff;}
.s-info{flex:1;min-width:0;}
.s-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-cls{font-size:11px;color:var(--text2);}
.s-amt{font-size:12px;font-weight:600;color:var(--blue);flex-shrink:0;}
.s-amt.zero{color:var(--text3);}

/* 태그 */
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:999px;font-weight:500;margin-right:3px;}
.tag-re{background:#FCECEA;color:#8B2020;}
.tag-dis{background:#E6F4EE;color:#1A5C3A;}
.tag-fix{background:#F0EEFA;color:#3A2080;}
.tag-pause{background:#F5F0E8;color:#7A6A40;}
.tag-bo{background:#E8F0FA;color:#1A3D6B;}
.tag-new{background:#FFF8E6;color:#7A5A00;}
.tag-special{background:#FEF3E2;color:#7A4A00;}

/* 메인 콘텐츠 */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.content::-webkit-scrollbar{width:6px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.no-select{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text3);font-size:14px;}

/* 학생 상세 */
.detail-wrap{padding:24px;display:flex;gap:24px;flex:1;}
.detail-left{flex:1;min-width:0;}
.detail-right{width:380px;flex-shrink:0;}

/* 상세 카드 */
.dcard{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:16px;}
.dcard-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em;}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bg);}
.drow:last-child{border-bottom:none;}
.dlbl{font-size:13px;color:var(--text2);flex-shrink:0;margin-right:12px;}
.dval{font-size:13px;font-weight:500;text-align:right;word-break:break-word;}
.dval.amount{color:var(--blue);font-size:16px;font-weight:700;}
.dval.red{color:var(--red);}
.dval.green{color:var(--green);}
.paid-toggle{display:flex;align-items:center;gap:8px;margin-top:12px;}
.paid-toggle-btn{padding:7px 20px;border-radius:999px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.paid-toggle-btn.unpaid{background:#FCECEA;color:var(--red);}
.paid-toggle-btn.paid{background:#E6F4EE;color:var(--green);}
.edit-inline{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.ei-row{display:flex;gap:8px;align-items:center;}
.ei-label{font-size:12px;color:var(--text2);width:80px;flex-shrink:0;}
.ei-input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;background:var(--bg);outline:none;}
.ei-input:focus{border-color:var(--blue);}
.ei-textarea{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;background:var(--bg);outline:none;resize:vertical;min-height:60px;}
.btn-row{display:flex;gap:8px;margin-top:8px;}
.btn{padding:7px 16px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-gray{background:var(--border);color:var(--text);}
.btn-red{background:#FCECEA;color:var(--red);}
.remain-badge{display:inline-block;background:#FEF3E2;color:#7A4A00;font-size:12px;padding:3px 10px;border-radius:999px;font-weight:600;margin-top:4px;}

/* 문자 패널 */
.msg-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;height:100%;}
.msg-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;gap:4px;flex-wrap:wrap;}
.msg-tab{padding:10px 12px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.msg-tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}
.msg-body{flex:1;padding:16px;overflow-y:auto;}
.msg-text{font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--text);background:var(--bg);padding:14px;border-radius:var(--radius-sm);min-height:200px;}
.msg-copy-btn{margin:12px 16px 16px;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;width:calc(100% - 32px);}
.msg-empty{color:var(--text3);font-size:13px;text-align:center;padding:40px 16px;}

/* 미납 오버레이 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:400px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{font-size:20px;cursor:pointer;color:var(--text2);}
.unpaid-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.unpaid-row:last-child{border-bottom:none;}
.unpaid-name{font-size:14px;font-weight:600;}
.unpaid-cls{font-size:12px;color:var(--text2);}
.unpaid-amt{font-size:14px;font-weight:700;color:var(--red);}
.unpaid-total-row{display:flex;justify-content:space-between;padding:14px 0 0;margin-top:8px;border-top:2px solid var(--border);}


</style>
</head>
<body>

<!-- 상단 헤더 -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">화강암플러스미술학원</div>
  </div>
  <div class="topbar-right">
    <div class="s-row" id="summaryRow1"></div>
    <button class="unpaid-btn" onclick="openUnpaid()">미납 확인</button>
  </div>
</div>

<!-- 메인<!-- 메인 -->
<div class="main">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-month">
      <button class="sm-btn on" onclick="switchMonth('jul',this)">7월</button>
      <button class="sm-btn" onclick="switchMonth('aug',this)">8월(예정)</button>
    </div>
    <div class="sidebar-search">
      <input class="search-input" id="searchInput" placeholder="이름 검색..." oninput="onSearch(this.value)">
    </div>
    <div class="class-filters" id="classFilters"></div>
    <div class="student-list" id="studentList"></div>
  </div>

  <!-- 콘텐츠 -->
  <div class="content" id="mainContent">
    <div class="no-select">← 학생을 선택하세요</div>
  </div>
</div>

<!-- 미납 모달 -->
<div class="overlay" id="unpaidOverlay" onclick="if(event.target===this)closeUnpaid()">
  <div class="modal">
    <div class="modal-title">미납 현황 <span class="modal-close" onclick="closeUnpaid()">×</span></div>
    <div id="unpaidList"></div>
    <div class="unpaid-total-row">
      <span style="font-weight:600;">총 미납액</span>
      <span style="font-size:16px;font-weight:700;color:var(--red)" id="unpaidTotal"></span>
    </div>
  </div>
</div>



<script>
const STORAGE_KEY = 'hwagangam_pc_v1';

// ── 수강료 계산 함수 ──
function calcAmount(cls, totalT, absence, fixed, fixedAmt) {
  if (fixed) return fixedAmt;
  const rate = (cls === '예비반') ? 30000 : (cls === '취미반') ? 25000 : 31250;
  return totalT * rate;
}

// ── 문자 생성 함수들 ──
const BANK = '부산은행 101-2092-8547-06 (예금주: 화강암플러스미술학원)';
const CONTACT = '학원: 051-553-3698\n원장: 010-7701-6594 (문자 문의 가능)';
const FOOTER = `\n■ 납부 방법\n${BANK}\n카드결제 시 아이편으로 보내주시면 결제 도와드리겠습니다.\n\n■ 문의\n${CONTACT}\n감사합니다.`;

function msgFeeNormal(s, month) {
  const mon = month === 'jul' ? '7월' : '8월';
  if (s.remain != null) {
    return `[수강 현황 안내 - ${s.name} 학생 (${s.cls})]\n안녕하세요. 화강암플러스미술학원입니다.\n${s.name} 학생의 수강 현황을 안내드립니다.\n\n■ 잔여 타임\n${s.remain}T 남음\n\n■ 추가 납부\n잔여 타임 소진 후 별도 안내 예정\n\n■ 문의\n${CONTACT}\n감사합니다.`;
  }
  let body = `■ 수업 일정\n${s.schedule}`;
  if (s.days) body += `\n\n■ 수업 일자 / 시수\n${s.days}`;
  if (s.absence > 0) body += `\n\n■ 전월 결석 차감\n-${s.absence}T (-${(s.absence*31250).toLocaleString()}원)`;
  body += `\n\n■ ${mon} 수강료\n${s.amount.toLocaleString()}원`;
  if (s.memo) body += `\n\n■ 참고\n${s.memo}`;
  return `[${mon} 수강료 안내 - ${s.name} 학생 (${s.cls})]\n안녕하세요. 화강암플러스미술학원입니다.\n${s.name} 학생의 ${mon} 수강료를 안내드립니다.\n\n${body}${FOOTER}`;
}

function msgSpecialJungo(s) {
  const sch = `■ 특강 기간\n7월 24일(목) ~ 8월 13일(목) [3주]\n\n■ 수업 일정 (주 8회, 8타임 선택)\n수요일  1타임 14:00~17:30  /  2타임 18:30~22:00\n목요일  1타임 14:00~17:30  /  2타임 18:30~22:00\n금요일  1타임 14:00~17:30  /  2타임 18:30~22:00\n토요일  1타임 13:00~16:30  /  2타임 17:30~21:00\n일요일  1타임 10:00~13:30  /  2타임 14:30~18:00\n\n→ 위 타임 중 8타임을 자유롭게 선택하여 수강\n\n■ 자습 안내\n방학 기간 중 정규 수업 시간 외에도 자습실을 자유롭게 이용하실 수 있습니다.\n수업 외 자습 시간을 적극 활용하시면 실력 향상에 큰 도움이 됩니다.\n자습 시간을 최대한 많이 활용해 주시길 적극 권장드립니다.`;
  const school = s.schoolInfo || {};
  let top = '';
  if (school.exam) top += `■ ${school.name} 1학기 기말고사\n${school.exam}\n\n`;
  if (school.vacStart) top += `■ 방학 일정\n방학 시작: ${school.vacStart}\n방학 종료: ${school.vacEnd}\n개학일: ${school.openDay}\n\n`;
  return `[2026 여름방학 예고입시 특강 안내 - ${s.name} 학생]\n안녕하세요. 화강암플러스미술학원입니다.\n${s.name} 학생의 여름방학 특강 일정을 안내드립니다.\n\n${top}${sch}\n\n■ 수강료 안내\n정규 수강료와 별도로 특강비를 산정하여 추후 개별 안내드릴 예정입니다.\n정규 수강료와 합산하여 결제도 가능합니다.\n\n※ 특강 이후에도 실기가 미흡하거나 추가 보충이 필요한 경우,\n   개학 후에도 추가 수업이 필요할 수 있는 점 참고 부탁드립니다.\n\n■ 수강 신청 및 문의\n${CONTACT}\n감사합니다.`;
}

function msgSpecialIpsi(s) {
  const sch = `■ 특강 기간\n7월 22일(화) ~ 8월 16일(일) [4주]\n\n■ 수업 일정 (풀타임 기준 40회)\n월요일  자습 (자유 이용)\n화요일  자습 (자유 이용)\n수요일  1타임 14:00~17:30  /  2타임 18:30~22:00 (정규수업)\n목요일  1타임 14:00~17:30  /  2타임 18:30~22:00 (정규수업)\n금요일  1타임 14:00~17:30  /  2타임 18:30~22:00 (정규수업)\n토요일  1타임 13:00~16:30  /  2타임 17:30~21:00 (정규수업)\n일요일  1타임 10:00~13:30  /  2타임 14:30~18:00 (시험)\n\n■ 자습 안내\n월, 화요일은 자습 운영으로 진행됩니다.\n방학 기간 중 정규 수업 시간 외에도 자습실을 자유롭게 이용하실 수 있습니다.\n자습 시간을 최대한 많이 활용해 주시길 적극 권장드립니다.\n\n■ 수강료 안내\n정규 수강료와 방학 특강 수강료를 합산하여 추후 개별 안내드릴 예정입니다.\n※ 특강 수강료는 재수생 할인 없이 동일 금액이 적용됩니다.`;
  return `[2026 여름방학 입시 특강 안내 - ${s.name} 학생 (${s.cls})]\n안녕하세요. 화강암플러스미술학원입니다.\n${s.name} 학생의 여름방학 입시 특강 일정을 안내드립니다.\n\n${sch}\n\n※ 특강 이후에도 실기가 미흡하거나 추가 보충이 필요한 경우,\n   개학 후에도 추가 수업이 필요할 수 있는 점 참고 부탁드립니다.\n\n■ 수강 신청 및 문의\n${CONTACT}\n감사합니다.`;
}

function msgCombined(s, month) {
  const mon = month === 'jul' ? '7월' : '8월';
  const isMinjee = s.name === '박민지';

function getMessages(s, month) {
  const msgs = [];
  const hasCombined = s.regularT !== undefined && s.specialT !== undefined;
  const isIpsi = s.cls === '입시반';
  const isJungo = s.cls === '중등반';

  msgs.push({ label: `${month==='jul'?'7':'8'}월 수강료`, text: msgFeeNormal(s, month) });
  if (hasCombined) msgs.push({ label: '특강+정규 합산', text: msgCombined(s, month) });
  if (isIpsi) msgs.push({ label: '입시 특강 안내', text: msgSpecialIpsi(s) });
  if (isJungo && s.schoolInfo) msgs.push({ label: '중등 특강 안내', text: msgSpecialJungo(s) });
  return msgs;
}

    { id:'aug_김가람', name:'김가람', cls:'취미반', tags:[], schedule:'토2,일2 주2회', days:'', absence:0, totalT:8, amount:200000, fixed:false, paid:false, memo:'' },
  ]
};

// ── 상태 ──
const FB_URL='https://hwa1-c1ad9-default-rtdb.firebaseio.com';
// loadDB: localStorage만 (동기)
function loadDB(){
  try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):null;}catch(e){return null;}
}
// saveDB: localStorage + Firebase 비동기
function saveDB(d){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){}
  fetch(`${FB_URL}/students.json`,{method:'PUT',body:JSON.stringify(d),headers:{'Content-Type':'application/json'}}).catch(()=>{});
}
// Firebase 동기화 (앱 시작 시 최신 데이터 가져오기)
async function syncFromFirebase(){
  const statusEl = document.getElementById('fb-status');
  try{
    const r=await fetch(`${FB_URL}/students.json`);
    if(!r.ok){ if(statusEl)statusEl.textContent='Firebase 오류: '+r.status; return; }
    const d=await r.json();
    if(d && d.jul && d.jul.length > 0){
      localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
      if(statusEl)statusEl.textContent='';
    } else {
      const uploadData=(db&&db.jul&&db.jul.length)?db:JSON.parse(JSON.stringify(initData));
      db=uploadData;
      saveDB(uploadData);
      if(statusEl)statusEl.textContent='';
    }
  }catch(e){
    if(statusEl)statusEl.textContent='Firebase 연결 실패';
    console.error('Firebase 오류:',e);
  }
}
function getDB() {
  const saved = loadDB();
  if (!saved || !saved.jul || !saved.jul.length) {
    const fresh = JSON.parse(JSON.stringify(initData));
    saveDB(fresh);
    return fresh;
  }
  ['jul','aug'].forEach(m => {
    initData[m].forEach(init => {
      if (!saved[m].find(s=>s.id===init.id)) saved[m].push(init);
    });
  });
  return saved;
}

let db = getDB();
let curMonth = 'jul';
let curFilter = 'all';
let curStudent = null;
let curMsgTab = 0;
let searchQ = '';
let aiMonth = 'jul';
let aiParsed = null;
let editing = false;

const fmt = n => n.toLocaleString('ko-KR') + '원';

// ── 태그 HTML ──
function tagHtml(t) {
  const [k,...rest] = t.split(':'); const label=rest.join(':');
  const cls = k==='fix'?'tag-fix':k==='pause'?'tag-pause':k==='re'?'tag-re':k==='dis'?'tag-dis':k==='bo'?'tag-bo':k==='new'?'tag-new':k==='special'?'tag-special':'tag-fix';
  return `<span class="tag ${cls}">${label}</span>`;
}

// ── 사이드바 렌더 ──
function renderSidebar() {
  const list = document.getElementById('studentList');
  list.innerHTML = '';
  const items = db[curMonth].filter(s => {
    // 잔여없는 학생 숨김 (amount=0, remain 없음, 고정요금 아님)
    if (s.amount === 0 && s.remain == null && !s.fixed) return false;
    if (searchQ && !s.name.includes(searchQ)) return false;
    if (curFilter === 'all') return true;
    if (curFilter === '미납') {
      const today = new Date();
      const cutoff = curMonth==='jul' ? new Date(2026,6,10) : new Date(2026,7,10);
      if (today < cutoff) return false;
      return !s.paid && s.amount > 0;
    }
    return s.cls === curFilter;
  });
  const groups = {};
  ['입시반','예비반','중등반','취미반'].forEach(c => { groups[c]=[]; });
  items.forEach(s => { if(groups[s.cls]) groups[s.cls].push(s); });

  ['입시반','예비반','중등반','취미반'].forEach(cls => {
    if (!groups[cls].length) return;
    const lbl = document.createElement('div');
    lbl.className='sec-label'; lbl.textContent=cls;
    list.appendChild(lbl);
    groups[cls].forEach(s => {
      const div = document.createElement('div');
      div.className='s-item'+(curStudent?.id===s.id?' active':'');
      const amtTxt = s.remain!=null ? `잔여 ${s.remain}T` : (s.amount===0?'-':fmt(s.amount));
      div.innerHTML=`
        <div class="s-check ${s.paid?'done':''}" onclick="togglePaid(event,'${s.id}')">
          ${s.paid?'✓':''}
        </div>
        <div class="s-info">
          <div class="s-name">${s.name}</div>
          <div class="s-cls">${s.schedule.split('\n')[0]}</div>
        </div>
        <div class="s-amt ${s.amount===0&&s.remain===null?'zero':''}">${amtTxt}</div>`;
      div.querySelector('.s-info').addEventListener('click', ()=>selectStudent(s));
      div.querySelector('.s-amt').addEventListener('click', ()=>selectStudent(s));
      list.appendChild(div);
    });
  });
}

// ── 요약 ──
function renderSummary() {
  const items = db[curMonth] || [];
  if(!items.length) return;
  const total = items.reduce((a,s)=>a+(s.amount||0),0);
  const paid = items.filter(s=>s.paid).reduce((a,s)=>a+(s.amount||0),0);
  const remain = total - paid;
  const clsList = ['입시반','예비반','중등반','취미반'];
  const clsTotal = {};
  clsList.forEach(c=>clsTotal[c]=0);
  items.forEach(s=>{ if(clsTotal[s.cls]!==undefined) clsTotal[s.cls]+=(s.amount||0); });

  const row = document.getElementById('summaryRow1');
  if(!row) return;
  row.innerHTML = `
    <div style="position:relative;display:flex;align-items:center;">
      <button class="s-toggle-btn" id="clsToggleBtn" onclick="toggleCls()">›</button>
      <div class="s-cls-panel" id="clsPanel">
        ${clsList.map(c=>`<div class="s-cls-item"><span class="s-cls-name">${c}</span><span class="s-cls-amt">${fmt(clsTotal[c])}</span></div>`).join('')}
      </div>
    </div>
    <div class="s-vdiv"></div>
    <div class="s-main-item"><span class="s-lbl">총 수강료</span><span class="s-val">${fmt(total)}</span></div>
    <div class="s-vdiv"></div>
    <div class="s-main-item"><span class="s-lbl">결제 완료</span><span class="s-val">${fmt(paid)}</span></div>
    <div class="s-vdiv"></div>
    <div class="s-main-item"><span class="s-lbl">잔여</span><span class="s-val remain">${fmt(remain)}</span></div>`;
}

function toggleCls() {
  const panel = document.getElementById('clsPanel');
  const btn = document.getElementById('clsToggleBtn');
  if(!panel) return;
  panel.classList.toggle('open');
  btn.textContent = panel.classList.contains('open') ? '›' : '‹';
}


function renderFilters() {
  const fc = document.getElementById('classFilters');
  fc.innerHTML='';
  ['all','입시반','예비반','중등반','취미반','미납'].forEach(f => {
    const b = document.createElement('button');
    b.className='cf-btn'+(curFilter===f?' on':'');
    b.textContent=f==='all'?'전체':f;
    b.onclick=()=>{ curFilter=f; renderFilters(); renderSidebar(); };
    fc.appendChild(b);
  });
}

// ── 학생 선택 ──
function selectStudent(s) {
  curStudent=s; curMsgTab=0; editing=false;
  renderSidebar();
  renderDetail();
}

// ── 결제 토글 ──
function togglePaid(e, id) {
  e.stopPropagation();
  ['jul','aug'].forEach(m=>{ const s=db[m].find(x=>x.id===id); if(s) s.paid=!s.paid; });
  saveDB(db);
  renderSidebar(); renderSummary();
  if (curStudent?.id===id) { curStudent=db[curMonth].find(x=>x.id===id); renderDetail(); }
}

// ── 상세 렌더 ──
function renderDetail() {
  const c = document.getElementById('mainContent');
  if (!curStudent) { c.innerHTML='<div class="no-select">← 학생을 선택하세요</div>'; return; }
  const s = curStudent;
  const msgs = getMessages(s, curMonth);

  c.innerHTML=`<div class="detail-wrap">
    <div class="detail-left">
      <!-- 기본 정보 -->
      <div class="dcard">
        <div class="dcard-title">${s.name} · ${s.cls}</div>
        <div style="margin-bottom:10px;">${s.tags.map(tagHtml).join('')}</div>
        <div class="drow"><span class="dlbl">수업 요일</span><span class="dval">${s.schedule.replace(/\n/g,'<br>')}</span></div>
        ${s.days?`<div class="drow"><span class="dlbl">수업 일자/시수</span><span class="dval">${s.days.replace(/\n/g,'<br>')}</span></div>`:''}
        ${s.absence>0?`<div class="drow"><span class="dlbl">결석 차감</span><span class="dval red">-${s.absence}T</span></div>`:''}
        ${s.totalT>0?`<div class="drow"><span class="dlbl">총 시수</span><span class="dval">${s.totalT}T</span></div>`:''}
        <div class="drow"><span class="dlbl">수강료</span><span class="dval amount">${s.remain!==null?'해당없음':fmt(s.amount)}</span></div>
        ${s.remain!==null?`<div class="drow"><span class="dlbl">잔여 타임</span><span class="dval"><span class="remain-badge">${s.remain}T</span></span></div>`:''}
        <div class="drow"><span class="dlbl">결제 여부</span><span class="dval ${s.paid?'green':'red'}">${s.paid?'결제완료':'미납'}</span></div>
        ${s.memo?`<div class="drow"><span class="dlbl">메모</span><span class="dval">${s.memo}</span></div>`:''}
        ${s.schoolInfo&&s.schoolInfo.exam?`<div class="drow"><span class="dlbl">기말고사</span><span class="dval">${s.schoolInfo.exam}</span></div>`:''}
        ${s.schoolInfo&&s.schoolInfo.vacStart?`<div class="drow"><span class="dlbl">방학일정</span><span class="dval">${s.schoolInfo.vacStart} ~ ${s.schoolInfo.vacEnd}<br>개학: ${s.schoolInfo.openDay}</span></div>`:''}
        <div class="paid-toggle">
          <button class="paid-toggle-btn ${s.paid?'paid':'unpaid'}" onclick="togglePaid(event,'${s.id}')">
            ${s.paid?'✓ 결제완료 (클릭시 취소)':'✗ 미납 (클릭시 완료처리)'}
          </button>
          <button class="btn btn-gray" onclick="toggleEdit()">편집</button>
        </div>
        <div id="editForm" style="display:none;">
          <div class="edit-inline">
            <div class="ei-row"><span class="ei-label">수업 요일</span><textarea class="ei-textarea" id="ef-schedule">${s.schedule}</textarea></div>
            <div class="ei-row"><span class="ei-label">수업일자/시수</span><textarea class="ei-textarea" id="ef-days">${s.days||''}</textarea></div>
            <div class="ei-row"><span class="ei-label">결석 차감(T)</span><input class="ei-input" type="number" id="ef-abs" value="${s.absence}"></div>
            <div class="ei-row"><span class="ei-label">총 시수(T)</span><input class="ei-input" type="number" id="ef-total" value="${s.totalT}"></div>
            <div class="ei-row"><span class="ei-label">수강료(원)</span><input class="ei-input" type="number" id="ef-amt" value="${s.amount}"></div>
            ${s.remain!==null?`<div class="ei-row"><span class="ei-label">잔여 타임</span><input class="ei-input" type="number" id="ef-remain" value="${s.remain}"></div>`:''}
            <div class="ei-row"><span class="ei-label">메모</span><textarea class="ei-textarea" id="ef-memo">${s.memo||''}</textarea></div>
            <div class="btn-row">
              <button class="btn btn-blue" onclick="saveEdit()">저장</button>
              <button class="btn btn-gray" onclick="toggleEdit()">취소</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-right">
      <div class="msg-panel" style="height:calc(100vh - 56px - 48px);">
        <div class="msg-tabs" id="msgTabs"></div>
        <div class="msg-body" id="msgBody"></div>
        <button class="msg-copy-btn" onclick="copyMsg()">문자 복사</button>
      </div>
    </div>
  </div>`;

  // 문자 탭 렌더
  const tabsEl = document.getElementById('msgTabs');
  const bodyEl = document.getElementById('msgBody');
  msgs.forEach((m,i) => {
    const t = document.createElement('div');
    t.className='msg-tab'+(i===curMsgTab?' on':'');
    t.textContent=m.label;
    t.onclick=()=>{ curMsgTab=i; document.querySelectorAll('.msg-tab').forEach((x,j)=>x.classList.toggle('on',j===i)); bodyEl.innerHTML=`<div class="msg-text">${msgs[i].text.replace(/\n/g,'<br>')}</div>`; };
    tabsEl.appendChild(t);
  });
  if (msgs.length>0) bodyEl.innerHTML=`<div class="msg-text">${msgs[curMsgTab].text.replace(/\n/g,'<br>')}</div>`;
  else bodyEl.innerHTML='<div class="msg-empty">문자 양식 없음</div>';
}

function toggleEdit() {
  editing=!editing;
  document.getElementById('editForm').style.display=editing?'block':'none';
}

function saveEdit() {
  const s = db[curMonth].find(x=>x.id===curStudent.id);
  s.schedule=document.getElementById('ef-schedule').value;
  s.days=document.getElementById('ef-days').value;
  s.absence=parseInt(document.getElementById('ef-abs').value)||0;
  s.totalT=parseInt(document.getElementById('ef-total').value)||0;
  s.amount=parseInt(document.getElementById('ef-amt').value)||0;
  s.memo=document.getElementById('ef-memo').value;
  const rem=document.getElementById('ef-remain');
  if(rem) s.remain=parseInt(rem.value)||0;
  saveDB(db); curStudent=s; editing=false;
  renderSidebar(); renderSummary(); renderDetail();
}

function copyMsg() {
  const msgs=getMessages(curStudent,curMonth);
  if(!msgs[curMsgTab]) return;
  navigator.clipboard.writeText(msgs[curMsgTab].text).then(()=>{
    const btn=document.querySelector('.msg-copy-btn');
    btn.textContent='복사됨!'; setTimeout(()=>btn.textContent='문자 복사',2000);
  });
}

// ── 월 전환 ──
function switchMonth(m,el) {
  curMonth=m; curStudent=null;
  document.querySelectorAll('.sm-btn').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderFilters(); renderSidebar(); renderSummary();
  document.getElementById('mainContent').innerHTML='<div class="no-select">← 학생을 선택하세요</div>';
}

// ── 검색 ──
function onSearch(v) { searchQ=v.trim(); renderSidebar(); }

// ── 미납 ──
function openUnpaid() {
  const ul=document.getElementById('unpaidList'); ul.innerHTML=''; let total=0;
  ['jul','aug'].forEach(month=>{
    const today=new Date();
    const cutoff=month==='jul'?new Date(2026,6,10):new Date(2026,7,10);
    if(today<cutoff) return;
    db[month].filter(s=>!s.paid&&s.amount>0).forEach(s=>{
      total+=s.amount;
      ul.innerHTML+=`<div class="unpaid-row"><div><div class="unpaid-name">${s.name} <span style="font-size:11px;color:var(--text3)">${month==='jul'?'7월':'8월'}</span></div><div class="unpaid-cls">${s.cls}</div></div><div class="unpaid-amt">${fmt(s.amount)}</div></div>`;
    });
  });
  if(!ul.innerHTML) ul.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">미납 없음</div>';
  document.getElementById('unpaidTotal').textContent=fmt(total);
  document.getElementById('unpaidOverlay').classList.add('on');
}
function closeUnpaid() { document.getElementById('unpaidOverlay').classList.remove('on'); }



// ── 초기화 ──
// 즉시 렌더
renderFilters();
renderSidebar();
renderSummary();
// Firebase 백그라운드 동기화 (재렌더 없음)
syncFromFirebase();
</script>
